<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <title>Animated giraffe driving a tiny car</title>
  <style>
    .cloud { animation: drift linear infinite; }
    @keyframes drift { from { transform: translateX(-280px); } to { transform: translateX(1180px); } }

    .rays { animation: spin 26s linear infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .car { animation: bounce .55s ease-in-out infinite; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

    .shadow { animation: shadowpulse .55s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes shadowpulse { 0%,100% { transform: scaleX(1); opacity: .18; } 50% { transform: scaleX(.9); opacity: .12; } }

    .wheel { animation: spin .6s linear infinite; transform-box: fill-box; transform-origin: center; }

    .giraffe { animation: sway 2.6s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 92%; }
    @keyframes sway { 0%,100% { transform: rotate(-2.4deg); } 50% { transform: rotate(2.4deg); } }

    .scarf { animation: flutter .8s ease-in-out infinite; transform-box: fill-box; transform-origin: 100% 40%; }
    @keyframes flutter { 0%,100% { transform: rotate(5deg); } 50% { transform: rotate(-6deg) translateY(-5px); } }

    .roadline { stroke-dasharray: 46 40; animation: roadmove .42s linear infinite; }
    @keyframes roadmove { to { stroke-dashoffset: -86; } }

    .bush { animation: pass linear infinite; }
    @keyframes pass { from { transform: translateX(1000px); } to { transform: translateX(-220px); } }

    .puff { animation: puff 1.35s ease-out infinite; opacity: 0; transform-box: fill-box; transform-origin: center; }
    @keyframes puff { 0% { transform: translate(0,0) scale(.45); opacity: .75; } 100% { transform: translate(-95px,-34px) scale(1.9); opacity: 0; } }

    .eye { animation: blink 4.2s infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes blink { 0%, 93%, 100% { transform: scaleY(1); } 96% { transform: scaleY(.12); } }

    .honk { animation: honk 4.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; opacity: 0; }
    @keyframes honk { 0%, 68%, 100% { transform: scale(.3); opacity: 0; } 74%, 88% { transform: scale(1); opacity: 1; } }

    .speed { stroke-dasharray: 34 100; animation: speedmove .38s linear infinite; }
    @keyframes speedmove { to { stroke-dashoffset: -134; } }

    .birdbob { animation: birdbob 1.6s ease-in-out infinite; }
    @keyframes birdbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  </style>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7EC8F0"/>
      <stop offset="1" stop-color="#DFF4FD"/>
    </linearGradient>
  </defs>

  <rect width="900" height="560" fill="url(#sky)"/>

  <g>
    <g class="rays" stroke="#FFD84D" stroke-width="7" stroke-linecap="round">
      <line x1="824" y1="95" x2="842" y2="95"/><line x1="808.2" y1="133.2" x2="820.9" y2="145.9"/>
      <line x1="770" y1="149" x2="770" y2="167"/><line x1="731.8" y1="133.2" x2="719.1" y2="145.9"/>
      <line x1="716" y1="95" x2="698" y2="95"/><line x1="731.8" y1="56.8" x2="719.1" y2="44.1"/>
      <line x1="770" y1="41" x2="770" y2="23"/><line x1="808.2" y1="56.8" x2="820.9" y2="44.1"/>
    </g>
    <circle cx="770" cy="95" r="42" fill="#FFD84D"/>
    <circle cx="758" cy="84" r="10" fill="#FFE89A" opacity=".8"/>
  </g>

  <g class="cloud" style="animation-duration: 30s; animation-delay: -6s;">
    <g fill="#FFFFFF" opacity=".95">
      <ellipse cx="120" cy="90" rx="46" ry="24"/><ellipse cx="160" cy="78" rx="38" ry="26"/>
      <ellipse cx="196" cy="94" rx="42" ry="20"/>
    </g>
  </g>
  <g class="cloud" style="animation-duration: 42s; animation-delay: -20s;">
    <g fill="#FFFFFF" opacity=".9">
      <ellipse cx="420" cy="60" rx="38" ry="18"/><ellipse cx="452" cy="50" rx="30" ry="20"/>
      <ellipse cx="480" cy="64" rx="32" ry="15"/>
    </g>
  </g>
  <g class="cloud" style="animation-duration: 24s; animation-delay: -14s;">
    <g fill="#FFFFFF" opacity=".85">
      <ellipse cx="620" cy="170" rx="34" ry="15"/><ellipse cx="648" cy="160" rx="26" ry="17"/>
      <ellipse cx="672" cy="172" rx="26" ry="12"/>
    </g>
  </g>

  <g class="cloud" style="animation-duration: 38s; animation-delay: -25s;">
    <g class="birdbob" stroke="#587887" stroke-width="3.5" fill="none" stroke-linecap="round">
      <path d="M300,120 q7,-8 14,0 q7,-8 14,0"/><path d="M352,142 q6,-7 12,0 q6,-7 12,0"/>
    </g>
  </g>

  <ellipse cx="140" cy="475" rx="270" ry="95" fill="#93CD83"/>
  <ellipse cx="760" cy="485" rx="310" ry="105" fill="#7FBE70"/>
  <g>
    <rect x="718" y="360" width="11" height="36" rx="4" fill="#8A5A3C"/>
    <circle cx="723" cy="344" r="27" fill="#5FA85C"/>
    <circle cx="702" cy="360" r="18" fill="#57A054"/><circle cx="745" cy="360" r="18" fill="#57A054"/>
  </g>

  <rect y="430" width="900" height="130" fill="#4B4F55"/>
  <rect y="430" width="900" height="8" fill="#3F4349"/>
  <line class="roadline" x1="0" y1="497" x2="900" y2="497" stroke="#F5F5F0" stroke-width="7"/>

  <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity=".4">
    <line class="speed" x1="60" y1="392" x2="220" y2="392"/>
    <line class="speed" x1="30" y1="418" x2="190" y2="418"/>
    <line class="speed" x1="80" y1="444" x2="200" y2="444"/>
  </g>

  <ellipse class="shadow" cx="400" cy="502" rx="175" ry="13" fill="#1E2226"/>

  <g class="car">
    <g fill="#C9CED3">
      <circle class="puff" cx="246" cy="442" r="10"/>
      <circle class="puff" cx="246" cy="442" r="8" style="animation-delay:-.45s"/>
      <circle class="puff" cx="246" cy="442" r="9" style="animation-delay:-.9s"/>
    </g>
    <circle cx="330" cy="455" r="38" fill="#2E3236"/>
    <circle cx="478" cy="455" r="38" fill="#2E3236"/>
    <rect x="240" y="436" width="16" height="9" rx="4" fill="#9AA3AB"/>
    <rect x="252" y="370" width="296" height="86" rx="34" fill="#FF5A4E"/>
    <rect x="252" y="418" width="296" height="38" rx="19" fill="#E0453B"/>
    <ellipse cx="330" cy="392" rx="46" ry="11" fill="#FFFFFF" opacity=".22" transform="rotate(-6 330 392)"/>
    <ellipse cx="382" cy="378" rx="72" ry="17" fill="#7E2A25"/>
    <path d="M452,372 L484,336 Q488,331 491,337 L472,372 Z" fill="#BFE8F7" opacity=".9" stroke="#8FB9C9" stroke-width="3"/>
    <line x1="452" y1="392" x2="470" y2="368" stroke="#3A3F44" stroke-width="6"/>
    <circle cx="476" cy="362" r="15" fill="none" stroke="#3A3F44" stroke-width="6"/>
    <circle cx="476" cy="362" r="4" fill="#3A3F44"/>

    <g class="giraffe">
      <g class="scarf" fill="none" stroke-linecap="round">
        <path d="M374,328 C344,314 312,330 286,318 C272,311 260,315 250,324" stroke="#D8382C" stroke-width="15"/>
        <path d="M372,340 C346,334 322,346 300,340" stroke="#B92B21" stroke-width="11"/>
      </g>
      <path d="M388,410 C382,332 396,252 404,170" stroke="#F6C344" stroke-width="42" fill="none" stroke-linecap="round"/>
      <g fill="#8A5A2B">
        <circle cx="368" cy="392" r="4.5"/><circle cx="366" cy="356" r="4.5"/><circle cx="368" cy="320" r="4.5"/>
        <circle cx="373" cy="284" r="4.5"/><circle cx="379" cy="248" r="4.5"/><circle cx="385" cy="212" r="4.5"/><circle cx="391" cy="182" r="4"/>
      </g>
      <g fill="#C98A2E">
        <circle cx="392" cy="382" r="7"/><circle cx="382" cy="340" r="5.5"/><circle cx="394" cy="298" r="6.5"/>
        <circle cx="386" cy="256" r="5"/><circle cx="398" cy="216" r="6"/><circle cx="392" cy="186" r="4.5"/>
      </g>
      <path d="M402,378 C428,368 452,362 468,362" stroke="#F6C344" stroke-width="13" fill="none" stroke-linecap="round"/>
      <ellipse cx="474" cy="361" rx="10" ry="8" fill="#8A5A2B"/>
      <g>
        <line x1="406" y1="118" x2="401" y2="94" stroke="#E8A93D" stroke-width="7" stroke-linecap="round"/>
        <line x1="426" y1="116" x2="428" y2="92" stroke="#E8A93D" stroke-width="7" stroke-linecap="round"/>
        <circle cx="400" cy="89" r="7.5" fill="#8A5A2B"/><circle cx="429" cy="87" r="7.5" fill="#8A5A2B"/>
        <ellipse cx="390" cy="120" rx="13" ry="8" fill="#F6C344" transform="rotate(-32 390 120)"/>
        <ellipse cx="390" cy="120" rx="7" ry="4" fill="#E8A93D" transform="rotate(-32 390 120)"/>
        <ellipse cx="418" cy="142" rx="36" ry="27" fill="#F6C344"/>
        <ellipse cx="451" cy="154" rx="25" ry="17" fill="#F9DA85"/>
        <circle cx="402" cy="152" r="5" fill="#C98A2E"/><circle cx="430" cy="128" r="4" fill="#C98A2E"/>
        <g class="eye">
          <circle cx="416" cy="134" r="7.5" fill="#FFFFFF"/>
          <circle cx="418.5" cy="134" r="4" fill="#33302B"/>
          <circle cx="420" cy="132" r="1.4" fill="#FFFFFF"/>
        </g>
        <path d="M408,124 l-4,-5 M416,122 l-1,-6" stroke="#33302B" stroke-width="2" stroke-linecap="round"/>
        <ellipse cx="464" cy="149" rx="3.2" ry="4.4" fill="#7A4A1E"/>
        <path d="M444,161 Q456,170 470,162" stroke="#7A4A1E" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="428" cy="156" r="5" fill="#F2A65A" opacity=".55"/>
      </g>
      <rect x="362" y="320" width="54" height="18" rx="9" fill="#E23B3B" transform="rotate(-4 389 329)"/>
    </g>

    <circle cx="540" cy="398" r="11" fill="#FFE98A" stroke="#D9A83A" stroke-width="3"/>
    <rect x="534" y="432" width="28" height="15" rx="7" fill="#C0C7CE"/>
    <rect x="238" y="432" width="26" height="15" rx="7" fill="#C0C7CE"/>

    <g>
      <circle cx="330" cy="455" r="34" fill="#33383D"/>
      <g class="wheel">
        <circle cx="330" cy="455" r="21" fill="#EDF0F2" stroke="#B9C0C6" stroke-width="3"/>
        <g stroke="#8A939B" stroke-width="6" stroke-linecap="round">
          <line x1="330" y1="439" x2="330" y2="471"/>
          <line x1="316.1" y1="447" x2="343.9" y2="463"/>
          <line x1="316.1" y1="463" x2="343.9" y2="447"/>
        </g>
        <circle cx="330" cy="455" r="5" fill="#6B7378"/>
      </g>
    </g>
    <g>
      <circle cx="478" cy="455" r="34" fill="#33383D"/>
      <g class="wheel">
        <circle cx="478" cy="455" r="21" fill="#EDF0F2" stroke="#B9C0C6" stroke-width="3"/>
        <g stroke="#8A939B" stroke-width="6" stroke-linecap="round">
          <line x1="478" y1="439" x2="478" y2="471"/>
          <line x1="464.1" y1="447" x2="491.9" y2="463"/>
          <line x1="464.1" y1="463" x2="491.9" y2="447"/>
        </g>
        <circle cx="478" cy="455" r="5" fill="#6B7378"/>
      </g>
    </g>
  </g>

  <g class="bush" style="animation-duration: 3.4s;">
    <g fill="#5FA85C">
      <circle cx="0" cy="542" r="20"/><circle cx="24" cy="547" r="15"/><circle cx="-22" cy="548" r="14"/>
    </g>
  </g>
  <g class="bush" style="animation-duration: 4.6s; animation-delay: -2.1s;">
    <g fill="#549B52">
      <circle cx="0" cy="550" r="16"/><circle cx="19" cy="554" r="12"/><circle cx="-18" cy="555" r="11"/>
    </g>
  </g>

  <g transform="rotate(9 585 296)">
    <text class="honk" x="560" y="300" font-family="Verdana, sans-serif" font-size="30" font-weight="bold" fill="#E0453B">Beep!</text>
  </g>
</svg>
