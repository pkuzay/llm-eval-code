<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS 18 Weather Card</title>
  <style>
    :root{
      --bg1:#0a0f1f;
      --bg2:#121a30;
      --bg3:#1d2747;
      --card-bg: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.64);
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --accent: #7cc7ff;
    }

    *{
      box-sizing: border-box;
    }

    html,body{
      margin:0;
      height:100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                   "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(79,109,255,0.18), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(77,207,255,0.12), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(125,89,255,0.18), transparent 40%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
      animation: bgShift 14s ease-in-out infinite alternate;
    }

    @keyframes bgShift{
      0%{
        filter: saturate(1) brightness(1);
      }
      100%{
        filter: saturate(1.18) brightness(1.05);
      }
    }

    .ambient{
      position: fixed;
      inset: -20%;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 25%, rgba(255,255,255,0.05), transparent 20%),
        radial-gradient(circle at 75% 25%, rgba(107,168,255,0.08), transparent 22%),
        radial-gradient(circle at 55% 75%, rgba(141,122,255,0.10), transparent 22%);
      filter: blur(40px);
      animation: ambientMove 20s ease-in-out infinite alternate;
    }

    @keyframes ambientMove{
      from{ transform: translate3d(-2%, 0, 0) scale(1); }
      to{ transform: translate3d(2%, -2%, 0) scale(1.04); }
    }

    .page{
      height:100%;
      display:grid;
      place-items:center;
      padding:24px;
      position:relative;
      z-index:1;
    }

    .weather-shell{
      width:min(420px, 92vw);
      perspective: 1200px;
    }

    .weather-card{
      position:relative;
      width:100%;
      min-height:720px;
      border-radius:34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)),
        rgba(255,255,255,0.06);
      border:1px solid var(--card-border);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.15);
      backdrop-filter: blur(30px) saturate(140%);
      -webkit-backdrop-filter: blur(30px) saturate(140%);
      overflow:hidden;
      transform-style:preserve-3d;
      transition:
        transform .18s ease,
        box-shadow .35s ease,
        background .5s ease;
    }

    .weather-card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,0.12), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,0.05), transparent 40%);
      pointer-events:none;
      mix-blend-mode:screen;
    }

    .weather-card::after{
      content:"";
      position:absolute;
      inset:auto -10% -35% -10%;
      height:40%;
      background: radial-gradient(circle at 50% 0%, rgba(120,160,255,0.16), transparent 60%);
      filter: blur(40px);
      pointer-events:none;
    }

    .card-top{
      padding:26px 26px 12px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      position:relative;
      z-index:3;
    }

    .meta .city{
      font-size:14px;
      color:var(--muted);
      letter-spacing:.2px;
      margin-bottom:8px;
    }

    .meta .temp{
      font-size:64px;
      line-height:1;
      font-weight:700;
      letter-spacing:-2px;
      margin-bottom:10px;
    }

    .meta .desc{
      font-size:18px;
      color:rgba(255,255,255,0.88);
      margin-bottom:4px;
      font-weight:600;
    }

    .meta .sub{
      font-size:14px;
      color:var(--muted);
    }

    .mini-chip{
      padding:10px 14px;
      border-radius:999px;
      background: rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.14);
      color:rgba(255,255,255,0.84);
      font-size:13px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .scene{
      position:relative;
      height:360px;
      margin:4px 16px 0;
      border-radius:28px;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
    }

    .scene-bg{
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 30% 20%, rgba(117,163,255,0.16), transparent 25%),
        radial-gradient(circle at 70% 30%, rgba(255,255,255,0.06), transparent 22%),
        linear-gradient(180deg, rgba(8,15,35,0.35), rgba(8,15,35,0.06));
      filter: blur(10px);
      transition: all .6s ease;
    }

    .orb{
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      left:50%;
      top:75px;
      transform:translateX(-50%);
      background: radial-gradient(circle at 35% 35%, #fffccf, #ffd75a 38%, #ffae00 72%, rgba(255,173,0,0.4));
      box-shadow:
        0 0 40px rgba(255,202,87,0.65),
        0 0 90px rgba(255,177,51,0.34);
      transition: all .6s ease;
      opacity:0;
    }

    .halo{
      position:absolute;
      width:220px;
      height:220px;
      border-radius:50%;
      left:50%;
      top:24px;
      transform:translateX(-50%);
      background: radial-gradient(circle, rgba(255,220,120,0.28), rgba(255,190,50,0.12) 40%, transparent 68%);
      filter: blur(10px);
      animation: pulse 3.2s ease-in-out infinite;
      opacity:0;
      transition: opacity .6s ease;
    }

    .rays{
      position:absolute;
      inset:0;
      opacity:0;
      transition:opacity .6s ease;
    }

    .ray{
      position:absolute;
      left:50%;
      top:135px;
      width:3px;
      height:58px;
      border-radius:999px;
      background: linear-gradient(180deg, rgba(255,230,153,0.9), rgba(255,180,0,0));
      transform-origin: 50% -12px;
      filter: blur(.2px);
    }

    .cloud{
      position:absolute;
      background: rgba(255,255,255,0.84);
      border-radius:999px;
      filter: blur(.2px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.45),
        0 10px 20px rgba(0,0,0,0.08);
      opacity:0;
      transition: opacity .6s ease, transform .6s ease;
    }

    .cloud::before,
    .cloud::after{
      content:"";
      position:absolute;
      background: inherit;
      border-radius:50%;
    }

    .cloud1{
      width:92px;
      height:34px;
      left:78px;
      top:105px;
      animation: drift1 8s ease-in-out infinite alternate;
    }
    .cloud1::before{
      width:34px;height:34px;left:10px;top:-14px;
    }
    .cloud1::after{
      width:46px;height:46px;left:36px;top:-22px;
    }

    .cloud2{
      width:114px;
      height:38px;
      right:64px;
      top:126px;
      opacity:0;
      animation: drift2 10s ease-in-out infinite alternate;
    }
    .cloud2::before{
      width:38px;height:38px;left:14px;top:-16px;
    }
    .cloud2::after{
      width:52px;height:52px;left:44px;top:-24px;
    }

    .storm-cloud{
      position:absolute;
      left:50%;
      top:92px;
      transform:translateX(-50%);
      width:170px;
      height:56px;
      border-radius:999px;
      background: linear-gradient(180deg, rgba(210,219,235,0.92), rgba(132,145,171,0.95));
      box-shadow:
        0 18px 24px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.20);
      opacity:0;
      transition: opacity .6s ease;
    }

    .storm-cloud::before,
    .storm-cloud::after{
      content:"";
      position:absolute;
      border-radius:50%;
      background: inherit;
    }

    .storm-cloud::before{
      width:56px;height:56px;left:20px;top:-24px;
    }
    .storm-cloud::after{
      width:74px;height:74px;left:68px;top:-36px;
    }

    .rain,
    .snow{
      position:absolute;
      inset:0;
      opacity:0;
      transition:opacity .6s ease;
      pointer-events:none;
    }

    .drop{
      position:absolute;
      width:3px;
      height:18px;
      border-radius:999px;
      background: linear-gradient(180deg, rgba(166,220,255,0.2), rgba(145,213,255,0.95));
      box-shadow: 0 0 10px rgba(130,206,255,0.45);
      animation: rainFall linear infinite;
    }

    @keyframes rainFall{
      0%{ transform: translateY(-30px); opacity:0; }
      12%{ opacity:1; }
      100%{ transform: translateY(260px); opacity:0; }
    }

    .puddle{
      position:absolute;
      left:50%;
      bottom:32px;
      transform:translateX(-50%);
      width:180px;
      height:26px;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(124,204,255,0.42), rgba(124,204,255,0.12) 60%, transparent 75%);
      filter: blur(1px);
      opacity:0;
      transition: opacity .6s ease;
      animation: puddlePulse 2.2s ease-in-out infinite;
    }

    @keyframes puddlePulse{
      0%,100%{ transform:translateX(-50%) scaleX(0.98); }
      50%{ transform:translateX(-50%) scaleX(1.04); }
    }

    .lightning{
      position:absolute;
      left:50%;
      top:146px;
      width:22px;
      height:76px;
      transform:translateX(-50%);
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(163,212,255,0.7));
      clip-path: polygon(44% 0, 100% 0, 60% 42%, 82% 42%, 22% 100%, 40% 58%, 14% 58%);
      filter: drop-shadow(0 0 12px rgba(193,226,255,0.85));
      opacity:0;
      animation: flash 2.8s infinite;
    }

    @keyframes flash{
      0%, 35%, 100%{ opacity:0; }
      36%{ opacity:1; }
      39%{ opacity:.2; }
      42%{ opacity:1; }
      45%{ opacity:0; }
    }

    .snowflake{
      position:absolute;
      color:#fff;
      font-size:14px;
      text-shadow: 0 0 12px rgba(255,255,255,0.4);
      animation: snowFall linear infinite;
      opacity:.92;
    }

    @keyframes snowFall{
      0%{ transform:translate3d(0,-24px,0) rotate(0deg); opacity:0; }
      10%{ opacity:1; }
      100%{ transform:translate3d(18px,260px,0) rotate(220deg); opacity:0; }
    }

    .snow-ground{
      position:absolute;
      left:22px;
      right:22px;
      bottom:14px;
      height:28px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(225,235,255,0.92));
      box-shadow:
        0 0 24px rgba(255,255,255,0.10),
        inset 0 1px 0 rgba(255,255,255,0.8);
      opacity:0;
      transition: opacity .6s ease;
    }

    .hills{
      position:absolute;
      left:-10%;
      right:-10%;
      bottom:-18px;
      height:120px;
      background:
        radial-gradient(ellipse at 20% 100%, rgba(255,255,255,0.10), transparent 40%),
        radial-gradient(ellipse at 50% 100%, rgba(255,255,255,0.08), transparent 45%),
        linear-gradient(180deg, transparent, rgba(255,255,255,0.03));
      opacity:.75;
    }

    .tree{
      position:absolute;
      left:50%;
      bottom:48px;
      width:64px;
      height:118px;
      transform:translateX(-50%);
      opacity:0;
      transition:opacity .6s ease;
    }

    .tree .trunk{
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:8px;
      height:48px;
      background: linear-gradient(180deg, #7b5237, #4a2f24);
      border-radius:999px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .tree .crown{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:58px;
      height:58px;
      border-radius:50%;
      background: radial-gradient(circle at 35% 30%, #8dffb7, #31b36b 68%, #1a7d49);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.2),
        0 8px 16px rgba(0,0,0,0.12);
      transform-origin:50% 100%;
      animation: sway 1.8s ease-in-out infinite alternate;
    }

    .tree .crown.c1{ top:10px; left:22px; width:40px; height:40px; }
    .tree .crown.c2{ top:0px; left:50%; width:50px; height:50px; }
    .tree .crown.c3{ top:16px; left:74%; width:36px; height:36px; }

    @keyframes sway{
      from{ transform: translateX(-50%) rotate(-5deg); }
      to{ transform: translateX(-50%) rotate(7deg); }
    }

    .wind-lines{
      position:absolute;
      inset:0;
      opacity:0;
      transition: opacity .6s ease;
      pointer-events:none;
    }

    .wind-line{
      position:absolute;
      height:2px;
      border-radius:999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(200,233,255,0.95), rgba(255,255,255,0));
      filter: blur(.2px);
      animation: windMove linear infinite;
    }

    @keyframes windMove{
      from{ transform: translateX(-110px); opacity:0; }
      10%{ opacity:.9; }
      to{ transform: translateX(140px); opacity:0; }
    }

    @keyframes drift1{
      from{ transform: translateX(-8px); }
      to{ transform: translateX(10px); }
    }

    @keyframes drift2{
      from{ transform: translateX(12px); }
      to{ transform: translateX(-10px); }
    }

    @keyframes pulse{
      0%,100%{ transform:translateX(-50%) scale(0.98); opacity:.85; }
      50%{ transform:translateX(-50%) scale(1.04); opacity:1; }
    }

    .metrics{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
      padding:18px 18px 10px;
      position:relative;
      z-index:3;
    }

    .metric{
      padding:14px 14px 12px;
      border-radius:20px;
      background: rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: transform .25s ease, background .3s ease;
    }

    .metric:hover{
      transform: translateY(-2px);
      background: rgba(255,255,255,0.09);
    }

    .metric .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .metric .value{
      font-size:18px;
      font-weight:700;
      letter-spacing:-.2px;
    }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      padding:16px 18px 22px;
      position:relative;
      z-index:4;
    }

    .weather-btn{
      border:none;
      outline:none;
      cursor:pointer;
      padding:12px 16px;
      border-radius:999px;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        0 6px 18px rgba(0,0,0,0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition:
        transform .18s ease,
        background .25s ease,
        box-shadow .25s ease,
        border-color .25s ease;
      font-size:14px;
      font-weight:600;
      letter-spacing:.2px;
    }

    .weather-btn:hover{
      transform: translateY(-2px);
      background: rgba(255,255,255,0.12);
    }

    .weather-btn:active{
      transform: scale(0.98);
    }

    .weather-btn.active{
      background: linear-gradient(180deg, rgba(137,196,255,0.26), rgba(86,148,255,0.18));
      border-color: rgba(154,210,255,0.35);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        0 10px 24px rgba(59,130,246,0.18);
    }

    /* --- Weather States --- */
    .weather-card.sunny .scene-bg{
      background:
        radial-gradient(circle at 50% 12%, rgba(255,213,99,0.20), transparent 24%),
        radial-gradient(circle at 30% 20%, rgba(255,188,51,0.10), transparent 25%),
        linear-gradient(180deg, rgba(29,48,92,0.50), rgba(15,24,52,0.14));
    }
    .weather-card.sunny .orb,
    .weather-card.sunny .halo,
    .weather-card.sunny .rays,
    .weather-card.sunny .cloud1,
    .weather-card.sunny .cloud2{
      opacity:1;
    }
    .weather-card.sunny .cloud1{ transform: translateY(0); }
    .weather-card.sunny .cloud2{ transform: translateY(0); }

    .weather-card.windy .scene-bg{
      background:
        radial-gradient(circle at 32% 18%, rgba(175,212,255,0.10), transparent 26%),
        radial-gradient(circle at 68% 26%, rgba(255,255,255,0.08), transparent 22%),
        linear-gradient(180deg, rgba(34,57,98,0.48), rgba(18,28,58,0.14));
    }
    .weather-card.windy .cloud1,
    .weather-card.windy .cloud2,
    .weather-card.windy .tree,
    .weather-card.windy .wind-lines{
      opacity:1;
    }

    .weather-card.rainy .scene-bg{
      background:
        radial-gradient(circle at 50% 18%, rgba(167,202,255,0.06), transparent 25%),
        linear-gradient(180deg, rgba(25,39,77,0.70), rgba(10,18,38,0.22));
    }
    .weather-card.rainy .storm-cloud,
    .weather-card.rainy .rain,
    .weather-card.rainy .puddle,
    .weather-card.rainy .lightning{
      opacity:1;
    }

    .weather-card.snowy .scene-bg{
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.10), transparent 26%),
        linear-gradient(180deg, rgba(39,54,92,0.54), rgba(19,27,52,0.18));
    }
    .weather-card.snowy .storm-cloud,
    .weather-card.snowy .snow,
    .weather-card.snowy .snow-ground{
      opacity:1;
    }

    .footer-note{
      padding:0 22px 22px;
      font-size:12px;
      color:rgba(255,255,255,0.45);
      position:relative;
      z-index:4;
    }

    @media (max-width: 480px){
      .weather-card{
        min-height:680px;
      }
      .meta .temp{
        font-size:56px;
      }
      .scene{
        height:330px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient"></div>

  <div class="page">
    <div class="weather-shell">
      <div class="weather-card sunny" id="weatherCard">
        <div class="card-top">
          <div class="meta">
            <div class="city">Cupertino</div>
            <div class="temp" id="temp">28°</div>
            <div class="desc" id="desc">晴朗 · 光照充足</div>
            <div class="sub" id="sub">体感 30° · 今日空气清透</div>
          </div>
          <div class="mini-chip" id="timeChip">Now · 14:28</div>
        </div>

        <div class="scene">
          <div class="scene-bg"></div>
          <div class="hills"></div>

          <!-- Sunny -->
          <div class="halo"></div>
          <div class="orb"></div>
          <div class="rays" id="rays"></div>
          <div class="cloud cloud1"></div>
          <div class="cloud cloud2"></div>

          <!-- Windy -->
          <div class="tree">
            <div class="crown c1"></div>
            <div class="crown c2"></div>
            <div class="crown c3"></div>
            <div class="trunk"></div>
          </div>
          <div class="wind-lines" id="windLines"></div>

          <!-- Rainy -->
          <div class="storm-cloud"></div>
          <div class="rain" id="rainLayer"></div>
          <div class="lightning"></div>
          <div class="puddle"></div>

          <!-- Snowy -->
          <div class="snow" id="snowLayer"></div>
          <div class="snow-ground"></div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="label">湿度</div>
            <div class="value" id="humidity">48%</div>
          </div>
          <div class="metric">
            <div class="label">风速</div>
            <div class="value" id="wind">6 km/h</div>
          </div>
          <div class="metric">
            <div class="label">降水概率</div>
            <div class="value" id="rainChance">2%</div>
          </div>
        </div>

        <div class="controls">
          <button class="weather-btn active" data-weather="sunny">☀️ 晴天</button>
          <button class="weather-btn" data-weather="windy">🌬️ 大风</button>
          <button class="weather-btn" data-weather="rainy">⛈️ 暴雨</button>
          <button class="weather-btn" data-weather="snowy">❄️ 暴雪</button>
        </div>

        <div class="footer-note">
          iOS 18 inspired UI · glassmorphism · micro interactions
        </div>
      </div>
    </div>
  </div>

  <script>
    const weatherCard = document.getElementById('weatherCard');
    const tempEl = document.getElementById('temp');
    const descEl = document.getElementById('desc');
    const subEl = document.getElementById('sub');
    const humidityEl = document.getElementById('humidity');
    const windEl = document.getElementById('wind');
    const rainChanceEl = document.getElementById('rainChance');
    const timeChip = document.getElementById('timeChip');
    const buttons = document.querySelectorAll('.weather-btn');
    const rainLayer = document.getElementById('rainLayer');
    const snowLayer = document.getElementById('snowLayer');
    const rays = document.getElementById('rays');
    const windLines = document.getElementById('windLines');

    const weatherData = {
      sunny: {
        temp: '28°',
        desc: '晴朗 · 光照充足',
        sub: '体感 30° · 今日空气清透',
        humidity: '48%',
        wind: '6 km/h',
        rainChance: '2%'
      },
      windy: {
        temp: '22°',
        desc: '大风 · 云层流动',
        sub: '阵风明显 · 体感略凉',
        humidity: '54%',
        wind: '28 km/h',
        rainChance: '8%'
      },
      rainy: {
        temp: '19°',
        desc: '暴雨 · 雷电活跃',
        sub: '地面湿滑 · 注意出行',
        humidity: '92%',
        wind: '18 km/h',
        rainChance: '96%'
      },
      snowy: {
        temp: '-3°',
        desc: '暴雪 · 积雪形成',
        sub: '能见度较低 · 注意保暖',
        humidity: '88%',
        wind: '12 km/h',
        rainChance: '78%'
      }
    };

    function createRays() {
      for (let i = 0; i < 12; i++) {
        const ray = document.createElement('div');
        ray.className = 'ray';
        ray.style.transform = `translateX(-50%) rotate(${i * 30}deg)`;
        ray.style.animation = `pulse ${2.2 + (i % 3) * 0.4}s ease-in-out ${i * 0.06}s infinite`;
        rays.appendChild(ray);
      }
    }

    function createRain() {
      const count = 42;
      for (let i = 0; i < count; i++) {
        const d = document.createElement('div');
        d.className = 'drop';
        d.style.left = `${10 + Math.random() * 80}%`;
        d.style.top = `${90 + Math.random() * 20}px`;
        d.style.height = `${12 + Math.random() * 14}px`;
        d.style.animationDuration = `${0.8 + Math.random() * 0.7}s`;
        d.style.animationDelay = `${Math.random() * 1.2}s`;
        d.style.opacity = `${0.6 + Math.random() * 0.4}`;
        rainLayer.appendChild(d);
      }
    }

    function createSnow() {
      const flakes = ['✦','✧','❄','✻','✼'];
      const count = 34;
      for (let i = 0; i < count; i++) {
        const f = document.createElement('div');
        f.className = 'snowflake';
        f.textContent = flakes[Math.floor(Math.random() * flakes.length)];
        f.style.left = `${6 + Math.random() * 88}%`;
        f.style.top = `${80 + Math.random() * 20}px`;
        f.style.fontSize = `${10 + Math.random() * 10}px`;
        f.style.animationDuration = `${3 + Math.random() * 4}s`;
        f.style.animationDelay = `${Math.random() * 4}s`;
        snowLayer.appendChild(f);
      }
    }

    function createWindLines() {
      const config = [
        [48, 90, 2.2, 0.0],
        [62, 122, 2.6, 0.3],
        [44, 154, 2.0, 0.8],
        [72, 188, 2.8, 0.2],
        [58, 220, 2.4, 0.7],
        [36, 250, 1.9, 1.1]
      ];

      config.forEach(([w, top, duration, delay]) => {
        const line = document.createElement('div');
        line.className = 'wind-line';
        line.style.width = `${w}%`;
        line.style.left = `-18%`;
        line.style.top = `${top}px`;
        line.style.animationDuration = `${duration}s`;
        line.style.animationDelay = `${delay}s`;
        windLines.appendChild(line);
      });
    }

    function setWeather(type) {
      weatherCard.classList.remove('sunny', 'windy', 'rainy', 'snowy');
      weatherCard.classList.add(type);

      const data = weatherData[type];
      tempEl.textContent = data.temp;
      descEl.textContent = data.desc;
      subEl.textContent = data.sub;
      humidityEl.textContent = data.humidity;
      windEl.textContent = data.wind;
      rainChanceEl.textContent = data.rainChance;

      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.weather === type);
      });
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        setWeather(btn.dataset.weather);
      });
    });

    function updateTime() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      timeChip.textContent = `Now · ${hh}:${mm}`;
    }

    // Card tilt micro interaction
    const shell = document.querySelector('.weather-shell');
    shell.addEventListener('mousemove', (e) => {
      const rect = shell.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      const rotateY = (x - 0.5) * 10;
      const rotateX = (0.5 - y) * 8;
      weatherCard.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.01)`;
    });

    shell.addEventListener('mouseleave', () => {
      weatherCard.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
    });

    // Init
    createRays();
    createRain();
    createSnow();
    createWindLines();
    updateTime();
    setInterval(updateTime, 1000 * 30);
  </script>
</body>
</html>
