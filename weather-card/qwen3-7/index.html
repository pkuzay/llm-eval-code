<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 18 Weather Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }

        .ambient-bg.sunny {
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 149, 0, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(255, 69, 58, 0.08) 0%, transparent 40%),
                        #0a0a0f;
        }

        .ambient-bg.windy {
            background: radial-gradient(ellipse at 50% 30%, rgba(100, 210, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 20% 70%, rgba(72, 199, 142, 0.08) 0%, transparent 40%),
                        #0a0a0f;
        }

        .ambient-bg.rainy {
            background: radial-gradient(ellipse at 40% 30%, rgba(50, 100, 180, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, rgba(100, 50, 150, 0.1) 0%, transparent 40%),
                        #0a0a0f;
        }

        .ambient-bg.snowy {
            background: radial-gradient(ellipse at 50% 40%, rgba(180, 200, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 30% 70%, rgba(100, 150, 255, 0.06) 0%, transparent 40%),
                        #0a0a0f;
        }

        /* Main Card */
        .weather-card {
            position: relative;
            width: 380px;
            height: 560px;
            border-radius: 32px;
            overflow: hidden;
            z-index: 1;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.6),
                0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .card-glass {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(40px) saturate(1.8);
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card-glass.sunny {
            background: linear-gradient(135deg, rgba(255, 149, 0, 0.12) 0%, rgba(255, 204, 0, 0.06) 50%, rgba(20, 20, 30, 0.85) 100%);
        }

        .card-glass.windy {
            background: linear-gradient(135deg, rgba(100, 210, 255, 0.1) 0%, rgba(72, 199, 142, 0.06) 50%, rgba(20, 25, 30, 0.85) 100%);
        }

        .card-glass.rainy {
            background: linear-gradient(135deg, rgba(50, 100, 180, 0.12) 0%, rgba(80, 50, 120, 0.06) 50%, rgba(15, 15, 25, 0.88) 100%);
        }

        .card-glass.snowy {
            background: linear-gradient(135deg, rgba(180, 210, 255, 0.1) 0%, rgba(120, 160, 220, 0.06) 50%, rgba(18, 18, 28, 0.85) 100%);
        }

        /* Canvas for weather effects */
        #weatherCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* Card Content */
        .card-content {
            position: relative;
            z-index: 3;
            padding: 40px 32px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .weather-icon-container {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .location-section {
            margin-top: 12px;
        }

        .location-name {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .location-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            font-weight: 400;
        }

        .temp-section {
            margin-top: -10px;
        }

        .temperature {
            font-size: 96px;
            font-weight: 200;
            color: #ffffff;
            letter-spacing: -4px;
            line-height: 1;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .temperature sup {
            font-size: 36px;
            font-weight: 300;
            vertical-align: super;
            letter-spacing: 0;
        }

        .weather-desc {
            font-size: 18px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
            transition: all 0.4s ease;
        }

        .weather-detail {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex: 1;
        }

        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .detail-value {
            font-size: 20px;
            font-weight: 500;
            color: #ffffff;
            margin-top: 4px;
        }

        /* Toggle Buttons */
        .toggle-section {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
            padding: 6px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .toggle-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 14px;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .toggle-btn:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .toggle-btn.active {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: 
                0 2px 8px rgba(0, 0, 0, 0.2),
                0 0 1px rgba(255, 255, 255, 0.1);
        }

        .toggle-btn:active {
            transform: scale(0.95);
        }

        /* Haptic feedback animation */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .weather-icon-container.animate {
            animation: pulse 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Lightning flash */
        .lightning-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            border-radius: 32px;
        }

        .lightning-flash.flash {
            animation: flash 0.15s ease-out;
        }

        @keyframes flash {
            0% { opacity: 0; }
            20% { opacity: 1; }
            40% { opacity: 0; }
            60% { opacity: 0.6; }
            80% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Subtle floating animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }

        .weather-icon-container {
            animation: float 4s ease-in-out infinite;
        }

        /* Glow effect */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 1;
        }

        .glow-orb.sunny {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 149, 0, 0.5) 0%, transparent 70%);
            top: 30px;
            right: 40px;
        }

        .glow-orb.windy {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(100, 210, 255, 0.4) 0%, transparent 70%);
            top: 40px;
            right: 30px;
        }

        .glow-orb.rainy {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(80, 100, 200, 0.4) 0%, transparent 70%);
            top: 30px;
            right: 50px;
        }

        .glow-orb.snowy {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(180, 210, 255, 0.35) 0%, transparent 70%);
            top: 40px;
            right: 40px;
        }

        /* Reflection line */
        .card-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
    </style>
</head>
<body>
    <div class="ambient-bg sunny" id="ambientBg"></div>
    
    <div class="weather-card">
        <div class="card-glass sunny" id="cardGlass"></div>
        <div class="glow-orb sunny" id="glowOrb"></div>
        <div class="lightning-flash" id="lightningFlash"></div>
        <canvas id="weatherCanvas"></canvas>
        
        <div class="card-content">
            <div>
                <div class="weather-icon-container" id="weatherIcon">☀️</div>
                <div class="location-section">
                    <div class="location-name">Shanghai</div>
                    <div class="location-sub">浦东新区 · 当前天气</div>
                </div>
            </div>
            
            <div class="temp-section">
                <div class="temperature" id="temperature">28<sup>°</sup></div>
                <div class="weather-desc" id="weatherDesc">晴朗</div>
                <div class="weather-detail">
                    <div class="detail-item">
                        <div class="detail-label">湿度</div>
                        <div class="detail-value" id="humidity">45%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">风速</div>
                        <div class="detail-value" id="windSpeed">12 km/h</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">体感</div>
                        <div class="detail-value" id="feelsLike">26°</div>
                    </div>
                </div>
            </div>
            
            <div class="toggle-section">
                <button class="toggle-btn active" data-weather="sunny" onclick="switchWeather('sunny')">☀️ 晴天</button>
                <button class="toggle-btn" data-weather="windy" onclick="switchWeather('windy')">💨 大风</button>
                <button class="toggle-btn" data-weather="rainy" onclick="switchWeather('rainy')">⛈️ 暴雨</button>
                <button class="toggle-btn" data-weather="snowy" onclick="switchWeather('snowy')">❄️ 暴雪</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('weatherCanvas');
        const ctx = canvas.getContext('2d');
        let currentWeather = 'sunny';
        let animationId;
        let particles = [];

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Weather data
        const weatherData = {
            sunny: { icon: '☀️', temp: '28<sup>°</sup>', desc: '晴朗', humidity: '45%', wind: '12 km/h', feels: '26°' },
            windy: { icon: '💨', temp: '22<sup>°</sup>', desc: '大风', humidity: '55%', wind: '48 km/h', feels: '18°' },
            rainy: { icon: '⛈️', temp: '16<sup>°</sup>', desc: '暴雨', humidity: '92%', wind: '28 km/h', feels: '12°' },
            snowy: { icon: '❄️', temp: '-3<sup>°</sup>', desc: '暴雪', humidity: '85%', wind: '15 km/h', feels: '-8°' }
        };

        // Particle classes
        class SunRay {
            constructor() {
                this.reset();
            }
            reset() {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                this.x = w * 0.65 + Math.random() * 40 - 20;
                this.y = h * 0.18 + Math.random() * 40 - 20;
                this.length = 60 + Math.random() * 100;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.002 + Math.random() * 0.003;
                this.opacity = 0.03 + Math.random() * 0.06;
                this.width = 1 + Math.random() * 2;
            }
            update() {
                this.angle += this.speed;
                if (this.angle > Math.PI * 2) this.angle -= Math.PI * 2;
            }
            draw() {
                const endX = this.x + Math.cos(this.angle) * this.length;
                const endY = this.y + Math.sin(this.angle) * this.length;
                const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
                gradient.addColorStop(0, `rgba(255, 200, 50, ${this.opacity})`);
                gradient.addColorStop(1, 'rgba(255, 200, 50, 0)');
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.width;
                ctx.stroke();
            }
        }

        class SunHalo {
            constructor() {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                this.x = w * 0.65;
                this.y = h * 0.18;
                this.radius = 40;
                this.pulseSpeed = 0.02;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }
            update(time) {
                this.radius = 45 + Math.sin(time * this.pulseSpeed + this.pulseOffset) * 10;
            }
            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, 'rgba(255, 220, 100, 0.15)');
                gradient.addColorStop(0.5, 'rgba(255, 180, 50, 0.06)');
                gradient.addColorStop(1, 'rgba(255, 150, 0, 0)');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        class WindLine {
            constructor() {
                this.reset();
            }
            reset() {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                this.x = -50;
                this.y = Math.random() * h;
                this.length = 40 + Math.random() * 80;
                this.speed = 4 + Math.random() * 6;
                this.opacity = 0.05 + Math.random() * 0.1;
                this.width = 0.5 + Math.random() * 1.5;
                this.wave = Math.random() * Math.PI * 2;
                this.waveSpeed = 0.05 + Math.random() * 0.05;
                this.waveAmp = 2 + Math.random() * 4;
            }
            update() {
                this.x += this.speed;
                this.wave += this.waveSpeed;
                const w = canvas.width / 2;
                if (this.x > w + 50) this.reset();
            }
            draw() {
                const waveY = this.y + Math.sin(this.wave) * this.waveAmp;
                ctx.beginPath();
                ctx.moveTo(this.x, waveY);
                ctx.lineTo(this.x + this.length, waveY + Math.sin(this.wave + 1) * this.waveAmp);
                ctx.strokeStyle = `rgba(180, 220, 255, ${this.opacity})`;
                ctx.lineWidth = this.width;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        class Cloud {
            constructor() {
                this.reset();
            }
            reset() {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                this.x = -100;
                this.y = 30 + Math.random() * (h * 0.4);
                this.speed = 0.8 + Math.random() * 1.5;
                this.size = 20 + Math.random() * 30;
                this.opacity = 0.08 + Math.random() * 0.12;
            }
            update() {
                this.x += this.speed;
                const w = canvas.width / 2;
                if (this.x > w + 100) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(200, 220, 240, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.arc(this.x + this.size * 0.8, this.y - this.size * 0.2, this.size * 0.7, 0, Math.PI * 2);
                ctx.arc(this.x - this.size * 0.6, this.y + this.size * 0.1, this.size * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Tree {
            constructor() {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                this.x = 30 + Math.random() * (w - 60);
                this.y = h - 20;
                this.height = 30 + Math.random() * 40;
                this.swayAngle = 0;
                this.swaySpeed = 0.03 + Math.random() * 0.02;
                this.swayMax = 0.15 + Math.random() * 0.1;
            }
            update(time) {
                this.swayAngle = Math.sin(time * this.swaySpeed) * this.swayMax;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.swayAngle);
                
                // Trunk
                ctx.fillStyle = 'rgba(100, 70, 40, 0.3)';
                ctx.fillRect(-2, -this.height, 4, this.height);
                
                // Leaves
                ctx.fillStyle = 'rgba(60, 120, 60, 0.2)';
                ctx.beginPath();
                ctx.ellipse(0, -this.height - 5, 12, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        class Raindrop {
            constructor() {
                this.reset();
            }
            reset() {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                this.x = Math.random() * w;
                this.y = -10 - Math.random() * 50;
                this.speed = 12 + Math.random() * 8;
                this.length = 15 + Math.random() * 20;
                this.opacity = 0.2 + Math.random() * 0.3;
                this.width = 0.5 + Math.random() * 1;
                this.wind = -2 + Math.random() * -1;
            }
            update() {
                this.y += this.speed;
                this.x += this.wind;
                const h = canvas.height / 2;
                if (this.y > h - 10) {
                    this.createSplash();
                    this.reset();
                }
            }
            createSplash() {
                // Splash particles stored globally
                const h = canvas.height / 2;
                for (let i = 0; i < 3; i++) {
                    splashes.push(new Splash(this.x, h - 10));
                }
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.wind * 0.5, this.y + this.length);
                ctx.strokeStyle = `rgba(150, 180, 255, ${this.opacity})`;
                ctx.lineWidth = this.width;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        class Splash {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = -2 - Math.random() * 3;
                this.life = 1;
                this.decay = 0.05 + Math.random() * 0.03;
                this.size = 1 + Math.random() * 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= this.decay;
            }
            draw() {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(150, 180, 255, ${this.life * 0.4})`;
                ctx.fill();
            }
        }

        class Puddle {
            constructor() {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                this.x = Math.random() * w;
                this.y = h - 8 - Math.random() * 4;
                this.radius = 0;
                this.maxRadius = 3 + Math.random() * 5;
                this.speed = 0.1 + Math.random() * 0.1;
                this.opacity = 0.15;
            }
            update() {
                if (this.radius < this.maxRadius) {
                    this.radius += this.speed;
                } else {
                    this.opacity -= 0.003;
                }
            }
            draw() {
                if (this.opacity <= 0) return;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 150, 220, ${this.opacity})`;
                ctx.fill();
                // Ripple
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(150, 180, 255, ${this.opacity * 0.5})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
            isDead() {
                return this.opacity <= 0;
            }
        }

        class Snowflake {
            constructor() {
                this.reset();
            }
            reset() {
                const w = canvas.width / 2;
                this.x = Math.random() * w;
                this.y = -10 - Math.random() * 30;
                this.speed = 1 + Math.random() * 2;
                this.size = 1.5 + Math.random() * 3.5;
                this.opacity = 0.4 + Math.random() * 0.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                this.wobbleAmp = 0.5 + Math.random() * 1;
            }
            update() {
                this.y += this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * this.wobbleAmp;
                const h = canvas.height / 2;
                if (this.y > h - 20) {
                    this.y = h - 20 + Math.random() * 10;
                    this.speed = 0;
                    this.opacity -= 0.005;
                }
            }
            draw() {
                if (this.opacity <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(230, 240, 255, ${this.opacity})`;
                ctx.fill();
                
                // Sparkle
                if (Math.random() < 0.01) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, 0.2)`;
                    ctx.fill();
                }
            }
        }

        class SnowAccumulation {
            constructor() {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                this.segments = [];
                for (let i = 0; i < w / 4; i++) {
                    this.segments.push({
                        x: i * 4,
                        height: 0,
                        maxHeight: 8 + Math.random() * 12,
                        growSpeed: 0.01 + Math.random() * 0.02
                    });
                }
            }
            update() {
                this.segments.forEach(seg => {
                    if (seg.height < seg.maxHeight) {
                        seg.height += seg.growSpeed;
                    }
                });
            }
            draw() {
                const h = canvas.height / 2;
                ctx.beginPath();
                ctx.moveTo(0, h);
                this.segments.forEach(seg => {
                    ctx.lineTo(seg.x, h - seg.height);
                });
                ctx.lineTo(canvas.width / 2, h);
                ctx.closePath();
                ctx.fillStyle = 'rgba(220, 235, 255, 0.12)';
                ctx.fill();
            }
        }

        let splashes = [];
        let puddles = [];
        let sunRays = [];
        let sunHalos = [];
        let windLines = [];
        let clouds = [];
        let trees = [];
        let raindrops = [];
        let snowflakes = [];
        let snowAccumulation;
        let time = 0;

        function initWeather(type) {
            particles = [];
            splashes = [];
            puddles = [];
            sunRays = [];
            sunHalos = [];
            windLines = [];
            clouds = [];
            trees = [];
            raindrops = [];
            snowflakes = [];

            switch(type) {
                case 'sunny':
                    for (let i = 0; i < 20; i++) sunRays.push(new SunRay());
                    for (let i = 0; i < 3; i++) sunHalos.push(new SunHalo());
                    break;
                case 'windy':
                    for (let i = 0; i < 15; i++) windLines.push(new WindLine());
                    for (let i = 0; i < 4; i++) clouds.push(new Cloud());
                    for (let i = 0; i < 5; i++) trees.push(new Tree());
                    break;
                case 'rainy':
                    for (let i = 0; i < 80; i++) raindrops.push(new Raindrop());
                    for (let i = 0; i < 5; i++) clouds.push(new Cloud());
                    break;
                case 'snowy':
                    for (let i = 0; i < 60; i++) snowflakes.push(new Snowflake());
                    snowAccumulation = new SnowAccumulation();
                    break;
            }
        }

        let lastLightning = 0;

        function animate() {
            const w = canvas.width / 2;
            const h = canvas.height / 2;
            ctx.clearRect(0, 0, w, h);
            time++;

            switch(currentWeather) {
                case 'sunny':
                    sunHalos.forEach(halo => { halo.update(time); halo.draw(); });
                    sunRays.forEach(ray => { ray.update(); ray.draw(); });
                    break;
                case 'windy':
                    windLines.forEach(line => { line.update(); line.draw(); });
                    clouds.forEach(cloud => { cloud.update(); cloud.draw(); });
                    trees.forEach(tree => { tree.update(time); tree.draw(); });
                    break;
                case 'rainy':
                    raindrops.forEach(drop => { drop.update(); drop.draw(); });
                    splashes.forEach(s => { s.update(); s.draw(); });
                    splashes = splashes.filter(s => s.life > 0);
                    clouds.forEach(cloud => { cloud.update(); cloud.draw(); });
                    
                    // Lightning effect
                    if (time - lastLightning > 180 && Math.random() < 0.008) {
                        triggerLightning();
                        lastLightning = time;
                    }
                    
                    // Create puddles
                    if (Math.random() < 0.03) {
                        puddles.push(new Puddle());
                    }
                    puddles.forEach(p => { p.update(); p.draw(); });
                    puddles = puddles.filter(p => !p.isDead());
                    break;
                case 'snowy':
                    snowflakes.forEach(flake => { flake.update(); flake.draw(); });
                    if (snowAccumulation) { snowAccumulation.update(); snowAccumulation.draw(); }
                    break;
            }

            animationId = requestAnimationFrame(animate);
        }

        function triggerLightning() {
            const flash = document.getElementById('lightningFlash');
            flash.classList.remove('flash');
            void flash.offsetWidth;
            flash.classList.add('flash');
            
            // Draw lightning bolt on canvas
            const w = canvas.width / 2;
            const h = canvas.height / 2;
            let x = w * 0.3 + Math.random() * w * 0.4;
            let y = 0;
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            while (y < h * 0.7) {
                x += (Math.random() - 0.5) * 30;
                y += 10 + Math.random() * 20;
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(200, 200, 255, 0.8)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 6;
            ctx.stroke();
        }

        function switchWeather(type) {
            if (type === currentWeather) return;
            currentWeather = type;

            // Update UI
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-weather="${type}"]`).classList.add('active');

            const data = weatherData[type];
            document.getElementById('weatherIcon').textContent = data.icon;
            document.getElementById('temperature').innerHTML = data.temp;
            document.getElementById('weatherDesc').textContent = data.desc;
            document.getElementById('humidity').textContent = data.humidity;
            document.getElementById('windSpeed').textContent = data.wind;
            document.getElementById('feelsLike').textContent = data.feels;

            // Animate icon
            const icon = document.getElementById('weatherIcon');
            icon.classList.remove('animate');
            void icon.offsetWidth;
            icon.classList.add('animate');

            // Update backgrounds
            const bg = document.getElementById('ambientBg');
            const glass = document.getElementById('cardGlass');
            const glow = document.getElementById('glowOrb');
            
            bg.className = `ambient-bg ${type}`;
            glass.className = `card-glass ${type}`;
            glow.className = `glow-orb ${type}`;

            // Initialize particles
            initWeather(type);
        }

        // Start
        initWeather('sunny');
        animate();
    </script>
</body>
</html>
