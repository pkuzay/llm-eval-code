<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLOBAL PULSE · 3D 数据可视化地球仪</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#03060e;
    font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:#dfe9f5; }
  #app { position:fixed; inset:0; }
  canvas { display:block; }

  /* ---------- 加载页 ---------- */
  #loader { position:fixed; inset:0; z-index:100; background:#03060e;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity .8s ease; }
  #loader.done { opacity:0; pointer-events:none; }
  .l-title { font-size:26px; letter-spacing:10px; color:#6fd6ff; margin-bottom:26px;
    text-shadow:0 0 24px rgba(80,180,255,.8); }
  .l-bar { width:280px; height:3px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
  .l-bar i { display:block; height:100%; width:0%;
    background:linear-gradient(90deg,#1e6fff,#6fd6ff); transition:width .3s; }
  .l-tip { margin-top:14px; font-size:12px; color:#5a7ba6; letter-spacing:3px; }

  /* ---------- 通用玻璃面板 ---------- */
  .glass { background:rgba(8,16,32,.62); backdrop-filter:blur(14px);
    border:1px solid rgba(110,190,255,.18); border-radius:14px;
    box-shadow:0 8px 40px rgba(0,0,0,.5), inset 0 0 30px rgba(40,110,220,.06); }

  /* ---------- 左侧控制面板 ---------- */
  #panel { position:fixed; top:20px; left:20px; z-index:20; width:268px; padding:18px 18px 14px; }
  #panel h1 { font-size:17px; letter-spacing:4px; color:#8fdcff;
    text-shadow:0 0 14px rgba(90,200,255,.6); font-weight:600; }
  #panel .sub { font-size:10px; color:#57749c; letter-spacing:2px; margin:3px 0 14px; }
  .sec-label { font-size:10px; color:#5f83b3; letter-spacing:2px; margin:12px 0 7px; }
  .metric-row { display:flex; gap:8px; }
  .metric-btn { flex:1; padding:8px 0; text-align:center; font-size:12px; cursor:pointer;
    border-radius:8px; border:1px solid rgba(120,190,255,.15); color:#9db8d8;
    background:rgba(20,40,70,.35); transition:all .25s; user-select:none; }
  .metric-btn:hover { border-color:rgba(140,210,255,.5); color:#e8f4ff; }
  .metric-btn.active { color:#08131f; font-weight:700; border-color:transparent;
    box-shadow:0 0 18px rgba(120,200,255,.35); }
  .toggle-row { display:flex; flex-wrap:wrap; gap:7px; }
  .tg { padding:6px 10px; font-size:11px; border-radius:20px; cursor:pointer; user-select:none;
    border:1px solid rgba(120,190,255,.15); color:#8aa8cc; background:rgba(20,40,70,.3); transition:all .25s; }
  .tg.on { background:rgba(50,130,255,.28); color:#cfeaff; border-color:rgba(130,210,255,.55);
    box-shadow:0 0 12px rgba(90,180,255,.25); }
  /* 排行 */
  #rank { margin-top:6px; }
  .rk { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:11px; }
  .rk .no { width:16px; color:#5f83b3; }
  .rk .nm { width:86px; color:#c6dcf5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rk .bar { flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,.06); overflow:hidden; }
  .rk .bar i { display:block; height:100%; border-radius:3px; transition:width .5s ease; }
  .rk .vl { width:58px; text-align:right; color:#7fa3cf; font-size:10px; }
  /* 热力图例 */
  #legend { margin-top:10px; }
  #legend .grad { height:8px; border-radius:4px;
    background:linear-gradient(90deg,rgba(20,60,200,.1),#2665e8,#28c8e8,#ffd94d,#ff5a3c); }
  #legend .lab { display:flex; justify-content:space-between; font-size:9px; color:#5f83b3; margin-top:3px; }

  /* ---------- 底部时间轴 ---------- */
  #timeline { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); z-index:20;
    width:min(640px,86vw); padding:14px 22px 12px; display:flex; align-items:center; gap:16px; }
  #playBtn { width:40px; height:40px; border-radius:50%; flex:none; cursor:pointer;
    border:1px solid rgba(130,210,255,.4); background:rgba(40,110,255,.18);
    display:flex; align-items:center; justify-content:center; transition:all .25s; }
  #playBtn:hover { background:rgba(60,140,255,.35); box-shadow:0 0 16px rgba(90,180,255,.4); }
  #playBtn svg { width:14px; height:14px; fill:#bfe6ff; }
  #yearBig { font-size:26px; font-weight:700; width:78px; text-align:center; color:#8fdcff;
    text-shadow:0 0 16px rgba(90,200,255,.55); font-variant-numeric:tabular-nums; }
  .slider-wrap { flex:1; }
  #yearSlider { width:100%; appearance:none; height:4px; border-radius:2px; outline:none;
    background:linear-gradient(90deg,#1e6fff var(--p,0%),rgba(255,255,255,.1) var(--p,0%)); cursor:pointer; }
  #yearSlider::-webkit-slider-thumb { appearance:none; width:16px; height:16px; border-radius:50%;
    background:#eaf6ff; border:3px solid #2f8fff; box-shadow:0 0 14px rgba(110,200,255,.9); cursor:pointer; }
  .ticks { display:flex; justify-content:space-between; font-size:9px; color:#4e6d99; margin-top:6px;
    letter-spacing:1px; }

  /* ---------- 城市弹窗 ---------- */
  #popup { position:fixed; z-index:30; min-width:210px; padding:14px 16px; pointer-events:none;
    transform:translate(-50%,calc(-100% - 22px)); opacity:0; transition:opacity .25s; }
  #popup.show { opacity:1; }
  #popup::after { content:""; position:absolute; left:50%; bottom:-7px; width:12px; height:12px;
    transform:translateX(-50%) rotate(45deg); background:rgba(8,16,32,.85);
    border-right:1px solid rgba(110,190,255,.25); border-bottom:1px solid rgba(110,190,255,.25); }
  #popup .p-name { font-size:15px; font-weight:700; color:#eaf6ff; letter-spacing:1px; }
  #popup .p-country { font-size:10px; color:#6f92c0; letter-spacing:2px; margin:2px 0 10px; }
  #popup .p-row { display:flex; justify-content:space-between; font-size:11px; margin:5px 0; }
  #popup .p-row .k { color:#7fa3cf; }
  #popup .p-row .v { color:#e8f4ff; font-weight:600; font-variant-numeric:tabular-nums; }
  #popup .p-year { margin-top:9px; padding-top:8px; border-top:1px dashed rgba(120,190,255,.2);
    font-size:10px; color:#5f83b3; letter-spacing:1px; }

  /* ---------- 提示 ---------- */
  #hint { position:fixed; right:20px; top:20px; z-index:20; padding:10px 16px;
    font-size:11px; color:#7fa3cf; letter-spacing:1px; line-height:1.9; }
  #hint b { color:#bfe0ff; font-weight:600; }

  @media (max-width:760px){ #panel{ width:220px; transform:scale(.9); transform-origin:top left; } #hint{display:none;} }
</style>

<body>
<div id="app"></div>

<!-- 加载页 -->
<div id="loader">
  <div class="l-title">GLOBAL PULSE</div>

<!-- 控制面板 -->
<div id="panel" class="glass">
  <h1>GLOBAL PULSE</h1>
  <div class="sub">3D DATA GLOBE · 全球城市数据可视化</div>

  <div class="sec-label">数据指标 METRIC</div>

</div>

<!-- 提示 -->
<div id="hint" class="glass">
  <b>拖拽</b> 旋转地球 · <b>滚轮</b> 缩放<br><b>点击城市光点</b> 查看详情
</div>

<!-- 时间轴 -->
<div id="timeline" class="glass">
  <div id="playBtn">
    <svg id="icoPlay" viewBox="0 0 24 24"><path d="M6 3l14 9-14 9z"/></svg>
    <svg id="icoPause" viewBox="0 0 24 24" style="display:none"><path d="M5 3h5v18H5zM14 3h5v18h-5z"/></svg>
  </div>

  <div class="p-row"><span class="k">人口</span><span class="v" id="ppPop">—</span></div>
  <div class="p-row"><span class="k">年航班量</span><span class="v" id="ppFl">—</span></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   1. 数据层
============================================================ */
const YEAR_START = 2015, YEAR_COUNT = 10;

// 城市基础数据（2015 基准值 + 年增长率），数值为合理近似
const CITIES = [
  { n:'New York',    c:'美国 · 北美',   lat: 40.71, lon:-74.00, gdp:1580, pop:19.9, fl:1230, g:[0.032, 0.004, 0.021] },
  { n:'London',      c:'英国 · 欧洲',   lat: 51.50, lon: -0.13, gdp: 980, pop: 9.3, fl:1080, g:[0.028, 0.008, 0.018] },
  { n:'Paris',       c:'法国 · 欧洲',   lat: 48.85, lon:  2.35, gdp: 790, pop:11.1, fl: 900, g:[0.022, 0.006, 0.015] },
  { n:'Moscow',      c:'俄罗斯 · 欧洲', lat: 55.76, lon: 37.62, gdp: 520, pop:12.5, fl: 620, g:[0.012, 0.003, 0.008] },
  { n:'Cairo',       c:'埃及 · 非洲',   lat: 30.04, lon: 31.24, gdp: 150, pop:20.5, fl: 260, g:[0.045, 0.020, 0.040] },
  { n:'Dubai',       c:'阿联酋 · 中东', lat: 25.20, lon: 55.27, gdp: 360, pop: 3.3, fl: 980, g:[0.052, 0.024, 0.058] },
  { n:'Mumbai',      c:'印度 · 南亚',   lat: 19.08, lon: 72.88, gdp: 310, pop:20.7, fl: 540, g:[0.068, 0.014, 0.072] },
  { n:'Singapore',   c:'新加坡 · 东南亚',lat:  1.35, lon:103.82, gdp: 320, pop: 5.7, fl: 860, g:[0.038, 0.012, 0.040] },
  { n:'Hong Kong',   c:'中国 · 东亚',   lat: 22.32, lon:114.17, gdp: 360, pop: 7.4, fl: 780, g:[0.024, 0.006, 0.010] },
  { n:'Shanghai',    c:'中国 · 东亚',   lat: 31.23, lon:121.47, gdp: 510, pop:24.9, fl: 950, g:[0.062, 0.010, 0.066] },
  { n:'Seoul',       c:'韩国 · 东亚',   lat: 37.57, lon:126.98, gdp: 480, pop: 9.7, fl: 640, g:[0.026, 0.002, 0.024] },
  { n:'Tokyo',       c:'日本 · 东亚',   lat: 35.68, lon:139.69, gdp:1520, pop:37.4, fl: 890, g:[0.012,-0.001, 0.012] },
  { n:'Sydney',      c:'澳大利亚 · 大洋洲',lat:-33.87, lon:151.21, gdp: 400, pop: 5.1, fl: 480, g:[0.028, 0.014, 0.026] },
  { n:'Johannesburg',c:'南非 · 非洲',   lat:-26.20, lon: 28.05, gdp: 130, pop: 5.9, fl: 300, g:[0.018, 0.016, 0.020] },
  { n:'São Paulo',   c:'巴西 · 南美',   lat:-23.55, lon:-46.63, gdp: 430, pop:22.0, fl: 560, g:[0.020, 0.009, 0.022] },
  { n:'Mexico City', c:'墨西哥 · 北美', lat: 19.43, lon:-99.13, gdp: 390, pop:21.8, fl: 520, g:[0.026, 0.011, 0.030] },
  { n:'Los Angeles', c:'美国 · 北美',   lat: 34.05, lon:-118.24, gdp: 960, pop:12.5, fl: 880, g:[0.034, 0.005, 0.024] },
  { n:'Toronto',     c:'加拿大 · 北美', lat: 43.65, lon:-79.38, gdp: 380, pop: 6.3, fl: 500, g:[0.030, 0.013, 0.028] },
];

// 生成 10 年时间序列（确定性伪波动）
CITIES.forEach((c, idx) => {
  const mk = (base, g, seed) =>
    Array.from({length: YEAR_COUNT}, (_, i) =>
      base * Math.pow(1 + g, i) * (1 + 0.045 * Math.sin(seed * 3.71 + i * 1.37)));
  c.series = {
    gdp:     mk(c.gdp, c.g[0], idx + 1),
    pop:     mk(c.pop, c.g[1], idx + 7),
    flights: mk(c.fl,  c.g[2], idx + 13),
  };
});

// 航线（城市索引对）
const ROUTES = [
  [0,1],[0,15],[0,12],[0,17],[1,4],[1,5],[1,16],[2,3],[2,14],
  [4,7],[4,13],[5,7],[7,8],[8,9],[9,16],[16,0],[8,16],[6,12],
  [7,10],[11,15],[10,6],[3,9],[13,14],[6,11]
];

const METRICS = {
  gdp:     { label:'GDP',     unit:'B$',  fmt:v=> '$' + v.toFixed(0) + 'B', color:new THREE.Color('#ffd166') },
  pop:     { label:'人口',     unit:'M',   fmt:v=> v.toFixed(1) + 'M',       color:new THREE.Color('#4cc9f0') },
  flights: { label:'航班',     unit:'K',   fmt:v=> (v/1000).toFixed(2)+'M',  color:new THREE.Color('#ff5d8f') },
};

const state = {
  metric:'gdp', time:0, playing:false,
  rotate:true, night:true, heat:true, arcs:true,
  selected:-1,
};

/* ============================================================
   2. 场景基础
============================================================ */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 0.8, 4.2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 1.7;
controls.maxDistance = 9;
controls.enablePan = false;

/* ---------- 星空背景 ---------- */
{
  const N = 2200, pos = new Float32Array(N*3), col = new Float32Array(N*3);
  for (let i=0; i<N; i++) {
    const v = new THREE.Vector3().randomDirection().multiplyScalar(60 + Math.random()*40);
    pos.set([v.x, v.y, v.z], i*3);
    const b = 0.4 + Math.random()*0.6, tint = Math.random();
    col.set([b*(tint>0.85?1:0.85), b*0.9, b], i*3);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',    new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    size:0.35, vertexColors:true, sizeAttenuation:true, depthWrite:false })));
}

/* ---------- 纹理加载 ---------- */
const loaderEl = document.getElementById('loader');
const lbar = document.getElementById('lbar');
const manager = new THREE.LoadingManager();
manager.onProgress = (_, l, t) => lbar.style.width = (l/t*100) + '%';
manager.onLoad = () => setTimeout(()=>loaderEl.classList.add('done'), 300);
const texLoader = new THREE.TextureLoader(manager);
const TEX = 'https://cdn.jsdelivr.net/npm/three-globe@2.31.1/example/img/';
const dayTex   = texLoader.load(TEX + 'earth-blue-marble.jpg');
const nightTex = texLoader.load(TEX + 'earth-night.jpg');
[dayTex, nightTex].forEach(t => { t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 8; });

/* ============================================================
   3. 地球（日夜分界线 Shader：昼面真实纹理 / 夜面城市灯光）
============================================================ */
const globeGroup = new THREE.Group();
scene.add(globeGroup);

const sunDirection = new THREE.Vector3(1, 0, 0);
const earthUniforms = {
  dayMap:       { value: dayTex },
  nightMap:     { value: nightTex },
  sunDirection: { value: sunDirection },
  uNightMix:    { value: 1.0 },
};
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 96, 96),
  new THREE.ShaderMaterial({
    uniforms: earthUniforms,
    vertexShader: /* glsl */`
      varying vec2 vUv;
      varying vec3 vWNormal;
      void main(){
        vUv = uv;
        vWNormal = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: /* glsl */`
      uniform sampler2D dayMap, nightMap;
      uniform vec3 sunDirection;
      uniform float uNightMix;
      varying vec2 vUv;
      varying vec3 vWNormal;
      void main(){
        vec3 n = normalize(vWNormal);
        float d = dot(n, normalize(sunDirection));
        float m = smoothstep(-0.14, 0.30, d);          // 晨昏线过渡带
        m = mix(1.0, m, uNightMix);
        vec3 dayC   = texture2D(dayMap,   vUv).rgb;
        vec3 nightC = texture2D(nightMap, vUv).rgb;
        nightC *= vec3(1.5, 1.55, 1.9);                // 夜光偏冷提亮
        // 晨昏线附近的城市灯光最先亮起
        float term = (1.0 - smoothstep(0.02, 0.30, d)) * uNightMix;
        nightC *= 1.0 + term * 1.6;
        vec3 col = mix(nightC, dayC, m);
        // 大气边缘微亮
        float rim = pow(1.0 - abs(dot(n, vec3(0.0,0.0,1.0))), 2.0);
        gl_FragColor = vec4(col, 1.0);
      }`
  })
);
globeGroup.add(earth);

/* ---------- 大气辉光 ---------- */
const atmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.18, 64, 64),
  new THREE.ShaderMaterial({
    side: THREE.BackSide, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false,
    vertexShader: /* glsl */`
      varying vec3 vN;
      void main(){
        vN = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: /* glsl */`
      varying vec3 vN;
      void main(){
        float i = pow(max(0.62 + dot(vN, vec3(0.0, 0.0, 1.0)), 0.0), 4.5);
        gl_FragColor = vec4(0.35, 0.62, 1.0, 1.0) * i * 1.4;
      }`
  })
);
scene.add(atmosphere);

/* ============================================================
   4. 工具函数
============================================================ */
function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}
// 真实太阳方向（简化均时差）：由当前 UTC 时间推算直射点
function updateSun() {
  const now = new Date();
  const start = Date.UTC(now.getUTCFullYear(), 0, 0);
  const doy = (now.getTime() - start) / 864e5;
  const decl = -23.44 * Math.cos((Math.PI*2/365) * (doy + 10));
  const utcH = now.getUTCHours() + now.getUTCMinutes()/60 + now.getUTCSeconds()/3600;
  const lon = 180 - utcH * 15;
  sunDirection.copy(latLonToVec3(decl, lon, 1)).normalize();
}
updateSun(); setInterval(updateSun, 30000);

function valueAt(city, key, t) {
  const s = city.series[key];
  const i = Math.min(YEAR_COUNT - 2, Math.floor(t));
  const f = THREE.MathUtils.clamp(t - i, 0, 1);
  return s[i] * (1 - f) + s[i + 1] * f;
}

/* ---------- 发光贴图 ---------- */
function glowTexture(inner = 'rgba(255,255,255,1)', outer = 'rgba(255,255,255,0)') {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64,64,0, 64,64,64);
  g.addColorStop(0, inner); g.addColorStop(0.25, inner.replace(',1)', ',.9)'));
  g.addColorStop(1, outer);
  x.fillStyle = g; x.fillRect(0,0,128,128);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const glowTex = glowTexture();

/* ============================================================
   5. 热力层（Canvas 等距柱状投影热力纹理）
============================================================ */
const HEAT_W = 1024, HEAT_H = 512;
const heatCanvas = document.createElement('canvas');
heatCanvas.width = HEAT_W; heatCanvas.height = HEAT_H;
const hctx = heatCanvas.getContext('2d');
const heatTex = new THREE.CanvasTexture(heatCanvas);
heatTex.colorSpace = THREE.SRGBColorSpace;
const heatMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1.012, 64, 64),
  new THREE.MeshBasicMaterial({ map:heatTex, transparent:true,
    blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.9 })
);
globeGroup.add(heatMesh);

function heatColor(v) { // 蓝→青→黄→红
  const h = (1 - v) * 220;
  return `hsla(${h}, 95%, ${45 + v*15}%, `;
}
function drawHeat(normVals) {
  hctx.clearRect(0, 0, HEAT_W, HEAT_H);
  hctx.globalCompositeOperation = 'lighter';
  CITIES.forEach((c, i) => {
    const v = normVals[i];
    if (v < 0.03) return;
    const r = 26 + v * 78;
    const cx = (c.lon + 180) / 360 * HEAT_W;
    const cy = (90 - c.lat) / 180 * HEAT_H;
    for (const ox of [-HEAT_W, 0, HEAT_W]) {           // 处理经度环绕
      const g = hctx.createRadialGradient(cx+ox, cy, 0, cx+ox, cy, r);
      const col = heatColor(v);
      g.addColorStop(0,   col + (0.42 + v*0.3) + ')');
      g.addColorStop(0.5, col + 0.16 + ')');
      g.addColorStop(1,   col + '0)');
      hctx.fillStyle = g;
      hctx.beginPath(); hctx.arc(cx+ox, cy, r, 0, 7); hctx.fill();
    }
  });
  heatTex.needsUpdate = true;
}

/* ============================================================
   6. 城市标点（发光 Sprite + 拾取球）
============================================================ */
const cityGroup = new THREE.Group();
globeGroup.add(cityGroup);
const citySprites = [], hitMeshes = [];

CITIES.forEach((c, i) => {
  const pos = latLonToVec3(c.lat, c.lon, 1.015);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, color: 0xffffff, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false }));
  spr.position.copy(pos);
  cityGroup.add(spr); citySprites.push(spr);

  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.006, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0xffffff }));
  core.position.copy(pos); cityGroup.add(core);

  const hit = new THREE.Mesh(
    new THREE.SphereGeometry(0.045, 8, 8),
    new THREE.MeshBasicMaterial({ visible: false }));
  hit.position.copy(pos); hit.userData.cityIndex = i;
  cityGroup.add(hit); hitMeshes.push(hit);
});

/* ============================================================
   7. 航线（弧线 + 流动光点）
============================================================ */
const arcGroup = new THREE.Group();
globeGroup.add(arcGroup);
const arcData = [];

ROUTES.forEach(([ai, bi], k) => {
  const A = CITIES[ai], B = CITIES[bi];
  const va = latLonToVec3(A.lat, A.lon, 1.02);
  const vb = latLonToVec3(B.lat, B.lon, 1.02);
  const ang = va.angleTo(vb);
  const mid = va.clone().add(vb).multiplyScalar(0.5).normalize()
              .multiplyScalar(1.02 + ang * 0.32);
  const curve = new THREE.QuadraticBezierCurve3(va, mid, vb);

  // 弧线段（顶点色两端渐隐，加色混合下等效透明）
  const pts = curve.getPoints(72);
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const cols = new Float32Array(pts.length * 3);
  pts.forEach((_, j) => {
    const f = Math.sin(j / (pts.length - 1) * Math.PI);
    cols.set([f, f, f], j * 3);
  });
  g.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  const line = new THREE.Line(g, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.65,
    blending: THREE.AdditiveBlending, depthWrite: false }));
  arcGroup.add(line);

  // 流动光点
  const dots = [];
  for (let d = 0; d < 2; d++) {
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTex, color: 0xffffff, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false }));
    s.scale.setScalar(0.05);
    arcGroup.add(s); dots.push(s);
  }
  arcData.push({ curve, dots, line, speed: 0.10 + (k % 5) * 0.025, phase: k * 0.37 });
});

/* ============================================================
   8. UI 交互
============================================================ */
const popup = document.getElementById('popup');
const yearSlider = document.getElementById('yearSlider');
const yearBig = document.getElementById('yearBig');
const playBtn = document.getElementById('playBtn');
const rankEl = document.getElementById('rank');

function metricColorCSS() {
  const c = METRICS[state.metric].color;
  return `#${c.getHexString()}`;
}
function refreshMetricButtons() {
  document.querySelectorAll('.metric-btn').forEach(b => {
    const on = b.dataset.m === state.metric;
    b.classList.toggle('active', on);
    if (on) { b.style.background = metricColorCSS(); }
    else b.style.background = '';
  });
  rankEl.querySelectorAll('.bar i').forEach(i => i.style.background = metricColorCSS());
}
document.querySelectorAll('.metric-btn').forEach(b =>
  b.addEventListener('click', () => {
    state.metric = b.dataset.m;
    refreshMetricButtons(); updateRank();
    const col = METRICS[state.metric].color;
    citySprites.forEach(s => s.material.color.copy(col));
    arcData.forEach(a => {
      a.line.material.color.copy(col);
      a.line.material.opacity = state.metric === 'flights' ? 0.9 : 0.4;
      a.dots.forEach(d => d.material.color.copy(col));
    });
  }));

function bindToggle(id, key, cb) {
  const el = document.getElementById(id);
  el.addEventListener('click', () => {
    state[key] = !state[key];
    el.classList.toggle('on', state[key]);
    cb && cb();
  });
}
bindToggle('tgRotate', 'rotate');
bindToggle('tgNight',  'night');
bindToggle('tgHeat',   'heat',  () => heatMesh.visible = state.heat);
bindToggle('tgArcs',   'arcs',  () => arcGroup.visible = state.arcs);

yearSlider.addEventListener('input', () => {
  state.time = parseFloat(yearSlider.value);
  state.playing = false; syncPlayIcon();
  updateYearUI(); updateRank();
});
function updateYearUI() {
  yearBig.textContent = Math.floor(YEAR_START + state.time);
  yearSlider.value = state.time;
  yearSlider.style.setProperty('--p', (state.time / 9 * 100) + '%');
}
function syncPlayIcon() {
  document.getElementById('icoPlay').style.display  = state.playing ? 'none' : '';
  document.getElementById('icoPause').style.display = state.playing ? '' : 'none';
}
playBtn.addEventListener('click', () => {
  state.playing = !state.playing;
  if (state.playing && state.time >= 9) state.time = 0;
  syncPlayIcon();
});

function updateRank() {
  const key = state.metric, M = METRICS[key];
  const rows = CITIES.map((c, i) => ({ i, v: valueAt(c, key, state.time) }))
    .sort((a, b) => b.v - a.v).slice(0, 5);
  const max = rows[0].v;
  rankEl.innerHTML = rows.map((r, k) => `
    <div class="rk">
      <span class="no">${k + 1}</span>
      <span class="nm">${CITIES[r.i].n}</span>
      <span class="bar"><i style="width:${(r.v / max * 100).toFixed(0)}%;background:${metricColorCSS()}"></i></span>
      <span class="vl">${M.fmt(r.v)}</span>
    </div>`).join('');
}

/* ---------- 点击拾取 ---------- */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downPos = null;
renderer.domElement.addEventListener('pointerdown', e => downPos = [e.clientX, e.clientY]);
renderer.domElement.addEventListener('pointerup', e => {
  if (!downPos) return;
  const dx = e.clientX - downPos[0], dy = e.clientY - downPos[1];
  downPos = null;
  if (dx*dx + dy*dy > 25) return;                    // 拖拽不触发
  pointer.set(e.clientX / innerWidth * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(hitMeshes, false);
  if (hits.length) {
    const idx = hits[0].object.userData.cityIndex;
    // 只选中朝向相机的点
    const wp = hitMeshes[idx].getWorldPosition(new THREE.Vector3());
    if (wp.clone().normalize().dot(camera.position.clone().normalize()) > 0.1) {
      state.selected = idx;
      fillPopup(); popup.classList.add('show');
      return;
    }
  }
  state.selected = -1; popup.classList.remove('show');
});

function fillPopup() {
  const c = CITIES[state.selected]; if (!c) return;
  const y = Math.floor(YEAR_START + state.time);
  document.getElementById('ppName').textContent = c.n;
  document.getElementById('ppCountry').textContent = c.c;
  document.getElementById('ppGdp').textContent = '$' + valueAt(c,'gdp',state.time).toFixed(0) + ' B';
  document.getElementById('ppPop').textContent = valueAt(c,'pop',state.time).toFixed(1) + ' M';
  document.getElementById('ppFl').textContent  = (valueAt(c,'flights',state.time)/1000).toFixed(2) + ' M / 年';
  document.getElementById('ppYear').textContent = '数据年份 ' + y;
}

/* ============================================================
   9. 动画循环（数值插值 → 光点 / 热力 / 航线联动）
============================================================ */
const displayVals = new Array(CITIES.length).fill(0.1);
const clock = new THREE.Clock();
const tmpV = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 时间轴播放
  if (state.playing) {
    state.time += dt * 0.85;
    if (state.time >= 9) { state.time = 9; state.playing = false; syncPlayIcon(); }
    updateYearUI();
    if (Math.floor(t * 4) !== Math.floor((t - dt) * 4)) updateRank();
    if (state.selected >= 0) fillPopup();
  }

  // 地球自转（带动城市穿越昼夜线）
