<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 数据可视化地球仪 · Global Data Globe</title>
<style>
  :root{
    --accent:#4fc3f7;
    --accent2:#ff6ec7;
    --panel-bg:rgba(10,16,34,.72);
    --panel-border:rgba(120,170,255,.22);
    --text:#dbe7ff;
    --text-dim:#8aa0c8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
    background:radial-gradient(1200px 800px at 70% 20%,#101a3d 0%,#070d22 45%,#020409 100%);
    color:var(--text);
  }
  #scene{position:fixed;inset:0;display:block;cursor:grab}
  #scene.grabbing{cursor:grabbing}
  #scene.pointing{cursor:pointer}

  /* ---------- 通用面板 ---------- */
  .panel{
    position:fixed;z-index:10;
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:14px;
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,.45);
  }

  /* ---------- 标题 ---------- */
  #title{top:18px;left:18px;padding:14px 18px;max-width:320px}
  #title h1{font-size:17px;font-weight:600;letter-spacing:.5px;
    background:linear-gradient(90deg,#8fd8ff,#c79bff);-webkit-background-clip:text;background-clip:text;color:transparent}
  #title p{font-size:11.5px;color:var(--text-dim);margin-top:6px;line-height:1.6}

  /* ---------- 控制面板 ---------- */
  #control{top:132px;left:18px;padding:14px 16px;width:264px}
  .sec-title{font-size:11px;color:var(--text-dim);letter-spacing:1.5px;margin:10px 0 8px;text-transform:uppercase}
  .sec-title:first-child{margin-top:0}
  .btn-row{display:flex;gap:6px;flex-wrap:wrap}
  .mbtn{
    flex:1;min-width:70px;padding:7px 4px;font-size:12.5px;text-align:center;
    color:var(--text);background:rgba(79,195,247,.08);
    border:1px solid rgba(79,195,247,.25);border-radius:8px;cursor:pointer;
    transition:all .18s ease;user-select:none;
  }
  .mbtn:hover{background:rgba(79,195,247,.18)}
  .mbtn.active{background:linear-gradient(135deg,rgba(79,195,247,.35),rgba(199,155,255,.3));
    border-color:var(--accent);box-shadow:0 0 12px rgba(79,195,247,.35);color:#fff}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:5px 2px;font-size:12.5px}
  .switch{position:relative;width:34px;height:18px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider-tg{position:absolute;inset:0;border-radius:20px;background:rgba(255,255,255,.14);
    transition:.2s;cursor:pointer}
  .slider-tg:before{content:"";position:absolute;width:12px;height:12px;left:3px;top:3px;border-radius:50%;
    background:#aab8d8;transition:.2s}
  .switch input:checked + .slider-tg{background:rgba(79,195,247,.55)}
  .switch input:checked + .slider-tg:before{transform:translateX(16px);background:#fff}

  /* ---------- 图例 ---------- */
  #legend{margin-top:10px}
  #legend-bar{height:10px;border-radius:6px;
    background:linear-gradient(90deg,#0a2a6b,#0074d9,#2ecc71,#f1c40f,#e74c3c);
    border:1px solid rgba(255,255,255,.12)}
  #legend-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:5px}
  #legend-title{font-size:11.5px;color:var(--text);margin-bottom:6px}

  /* ---------- 时间轴 ---------- */
  #timeline{
    bottom:20px;left:50%;transform:translateX(-50%);
    width:min(720px,92vw);padding:12px 18px;
    display:flex;align-items:center;gap:14px;
  }
  #play-btn{
    width:38px;height:38px;flex:none;border-radius:50%;
    border:1px solid rgba(79,195,247,.5);cursor:pointer;
    background:rgba(79,195,247,.12);color:var(--accent);
    font-size:15px;display:flex;align-items:center;justify-content:center;
    transition:all .18s;
  }
  #play-btn:hover{background:rgba(79,195,247,.3);box-shadow:0 0 14px rgba(79,195,247,.4)}
  #year-display{font-size:22px;font-weight:700;min-width:64px;text-align:center;
    font-variant-numeric:tabular-nums;color:#fff;text-shadow:0 0 14px rgba(79,195,247,.6)}
  #year-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:4px;
    background:linear-gradient(90deg,var(--accent) var(--fill,0%),rgba(255,255,255,.14) var(--fill,0%));
    outline:none;cursor:pointer}
  #year-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:#fff;border:3px solid var(--accent);box-shadow:0 0 10px rgba(79,195,247,.7);cursor:pointer}
  #year-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:3px solid var(--accent);cursor:pointer}

  /* ---------- 城市弹窗 ---------- */
  #city-popup{
    position:fixed;z-index:20;min-width:210px;pointer-events:auto;
    background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:12px;
    backdrop-filter:blur(12px);padding:12px 14px;
    box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 20px rgba(79,195,247,.15);
    transform:translate(-50%,calc(-100% - 16px));display:none;
  }
  #city-popup:after{content:"";position:absolute;left:50%;bottom:-6px;width:10px;height:10px;
    background:inherit;border-right:1px solid var(--panel-border);border-bottom:1px solid var(--panel-border);
    transform:translateX(-50%) rotate(45deg)}
  #city-popup .cp-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;padding-right:16px}
  #city-popup .cp-name{font-size:15.5px;font-weight:600;color:#fff}
  #city-popup .cp-en{font-size:11px;color:var(--text-dim)}
  #city-popup .cp-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--text-dim)}
  #city-popup .cp-row b{color:var(--text);font-weight:500;font-variant-numeric:tabular-nums}
  #city-popup .cp-metric{margin-top:7px;padding-top:7px;border-top:1px dashed rgba(255,255,255,.14);
    font-size:12px;color:var(--accent)}
  #cp-close{position:absolute;top:8px;right:10px;cursor:pointer;color:var(--text-dim);font-size:13px;border:none;background:none}
  #cp-close:hover{color:#fff}

  /* ---------- 航线提示 ---------- */
  #arc-tip{
    position:fixed;z-index:20;pointer-events:none;display:none;
    background:rgba(8,14,30,.88);border:1px solid rgba(255,110,199,.4);border-radius:9px;
    padding:7px 11px;font-size:12px;color:#ffe6f5;
    box-shadow:0 4px 18px rgba(0,0,0,.5),0 0 14px rgba(255,110,199,.25);
    transform:translate(14px,-50%);white-space:nowrap;
  }
  #arc-tip b{color:#fff}

  /* ---------- 加载页 ---------- */
  #loading{
    position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;
    background:radial-gradient(800px 600px at 50% 40%,#0c1531,#020409);
    transition:opacity .6s;
  }
  #loading.done{opacity:0;pointer-events:none}
  .loader-globe{width:64px;height:64px;border-radius:50%;
    border:2px solid rgba(79,195,247,.25);border-top-color:var(--accent);
    animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{font-size:13px;color:var(--text-dim);letter-spacing:2px}

  /* ---------- 底部注释 ---------- */
  #note{position:fixed;right:16px;bottom:16px;z-index:9;font-size:10.5px;color:rgba(138,160,200,.65);text-align:right;line-height:1.7}

  @media (max-width:760px){
    #control{display:none}
    #title p{display:none}
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<!-- 标题 -->
<div id="title" class="panel">
  <h1>🌍 3D 数据可视化地球仪</h1>
  <p>拖拽旋转 · 滚轮缩放 · 点击城市查看详情<br>悬停航线查看航班信息 · 底部时间轴播放数据变迁</p>
</div>

<!-- 控制面板 -->
<div id="control" class="panel">
  <div class="sec-title">数据指标</div>
  <div class="btn-row" id="metric-btns">
    <div class="mbtn active" data-metric="gdp">GDP 总量</div>
    <div class="mbtn" data-metric="pop">人口</div>
    <div class="mbtn" data-metric="flights">航班量</div>
  </div>
  <div class="sec-title">图层与效果</div>
  <div class="toggle-row"><span>国家热力着色</span><label class="switch"><input type="checkbox" id="tg-heat" checked><span class="slider-tg"></span></label></div>
  <div class="toggle-row"><span>城市标记点</span><label class="switch"><input type="checkbox" id="tg-cities" checked><span class="slider-tg"></span></label></div>
  <div class="toggle-row"><span>航线与流动动画</span><label class="switch"><input type="checkbox" id="tg-arcs" checked><span class="slider-tg"></span></label></div>
  <div class="toggle-row"><span>大气光晕</span><label class="switch"><input type="checkbox" id="tg-atmo" checked><span class="slider-tg"></span></label></div>
  <div class="toggle-row"><span>地球自转</span><label class="switch"><input type="checkbox" id="tg-rotate" checked><span class="slider-tg"></span></label></div>
  <div class="toggle-row"><span>实时日夜分界线</span><label class="switch"><input type="checkbox" id="tg-sun" checked><span class="slider-tg"></span></label></div>
  <div id="legend">
    <div id="legend-title">GDP 总量（万亿美元）</div>
    <div id="legend-bar"></div>
    <div id="legend-labels"><span id="legend-min">–</span><span id="legend-max">–</span></div>
  </div>
</div>

<!-- 时间轴 -->
<div id="timeline" class="panel">
  <button id="play-btn" title="播放 / 暂停">▶</button>
  <div id="year-display">2024</div>
  <input type="range" id="year-slider" min="2000" max="2024" step="1" value="2024">
</div>

<!-- 城市信息弹窗 -->
<div id="city-popup">
  <button id="cp-close">✕</button>
  <div class="cp-head"><span class="cp-name"></span><span class="cp-en"></span></div>
  <div class="cp-row"><span>国家 / 地区</span><b class="cp-country"></b></div>
  <div class="cp-row"><span>都市圈人口</span><b class="cp-pop"></b></div>
  <div class="cp-row"><span>都市圈 GDP</span><b class="cp-gdp"></b></div>
  <div class="cp-metric"></div>
</div>

<!-- 航线提示 -->
<div id="arc-tip"></div>

<!-- 加载页 -->
<div id="loading">
  <div class="loader-globe"></div>
  <p>正在加载地球纹理与数据…</p>
</div>

<div id="note">Three.js · 真实地球纹理 · 单文件 ESM<br>数据为演示用模拟数据</div>

  }
}
</script>

/* 工具：插值取某年指标值 */
function seriesValue(arr, year){
  if (year <= YEAR_KEYS[0]) return arr[0];
  if (year >= YEAR_KEYS[YEAR_KEYS.length-1]) return arr[arr.length-1];
  for (let i = 0; i < YEAR_KEYS.length-1; i++){
    const y0 = YEAR_KEYS[i], y1 = YEAR_KEYS[i+1];
    if (year >= y0 && year <= y1){
      const t = (year - y0) / (y1 - y0);
      return arr[i] + (arr[i+1] - arr[i]) * t;
    }
  }
  return arr[arr.length-1];
}
function metricValue(iso, metric, year){
  const d = COUNTRY_DATA[iso];
  return d ? seriesValue(d[metric], year) : null;
}
/* 航班量年份系数：2000 → 0.55，2024 → 1.10 */
function flightYearFactor(year){ return 0.55 + 0.55 * (year - YEAR_MIN) / (YEAR_MAX - YEAR_MIN); }

/* 大圆距离（km） */
function haversineKm(a, b){
  const R2 = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return 2 * R2 * Math.asin(Math.sqrt(h));
}

/* 经纬度 → 三维坐标（与球体纹理映射一致） */
function latLonToVector3(lat, lon, r = R){
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

/* ---------- 太阳方向（实时日夜分界线） ---------- */
function getSunDirection(date){
  const start = Date.UTC(date.getUTCFullYear(), 0, 0);
  const doy = (date.getTime() - start) / 86400000;
  const decl = -23.44 * Math.cos((2 * Math.PI / 365) * (doy + 10)); // 太阳直射纬度
  const utcH = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
  const lon = (12 - utcH) * 15; // 太阳直射经度
  return latLonToVector3(decl, lon, 1).normalize();
}

/* ---------- 地球（白天 / 夜晚灯光混合着色器） ---------- */
const earthMat = new THREE.ShaderMaterial({
  uniforms: {
    dayMap:   { value: dayTex },
    nightMap: { value: nightTex },
    sunDirection: { value: sunDir },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    varying vec3 vWorldNormal;
    varying vec3 vViewDir;
    void main(){
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldNormal = normalize(mat3(modelMatrix) * normal);
      vViewDir = normalize(cameraPosition - wp.xyz);
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: /* glsl */`
    uniform sampler2D dayMap;
    uniform sampler2D nightMap;
    uniform vec3 sunDirection;
    varying vec2 vUv;
    varying vec3 vWorldNormal;
    varying vec3 vViewDir;
    void main(){
      vec3 n = normalize(vWorldNormal);
      vec3 sun = normalize(sunDirection);
      float dayAmount = dot(n, sun);

      vec3 dayColor   = texture2D(dayMap, vUv).rgb;
      vec3 nightColor = texture2D(nightMap, vUv).rgb;

      // 晨昏线平滑过渡
      float mixAmt = smoothstep(-0.12, 0.22, dayAmount);
      // 夜面：城市灯光增强 + 深蓝色海洋底
      vec3 night = nightColor * vec3(1.35, 1.25, 1.05) * 1.7 + vec3(0.012, 0.02, 0.045);
      vec3 color = mix(night, dayColor, mixAmt);

      // 晨昏线附近的暖色辉光
      float terminator = 1.0 - abs(dayAmount);
      float glow = pow(terminator, 14.0) * 0.35;
      color += vec3(0.9, 0.45, 0.2) * glow;

      // 边缘菲涅尔大气散射
      float fres = pow(1.0 - max(dot(normalize(vViewDir), n), 0.0), 2.6);
      color += vec3(0.25, 0.5, 0.95) * fres * (0.22 + 0.5 * mixAmt);

      gl_FragColor = vec4(color, 1.0);
    }`,
});
const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(R, 96, 96), earthMat);

const HEAT_STOPS = [
  [0.00, [10, 42, 107]], [0.25, [0, 116, 217]], [0.50, [46, 204, 113]],
  [0.75, [241, 196, 15]], [1.00, [231, 76, 60]],
];
function heatColor(t, alpha = 0.62){
  t = THREE.MathUtils.clamp(t, 0, 1);
  for (let i = 0; i < HEAT_STOPS.length - 1; i++){
    const [t0, c0] = HEAT_STOPS[i], [t1, c1] = HEAT_STOPS[i + 1];
    if (t >= t0 && t <= t1){
      const k = (t - t0) / (t1 - t0);
      const c = c0.map((v, j) => Math.round(v + (c1[j] - v) * k));
      return `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
    }
  }
  return `rgba(231,76,60,${alpha})`;
}

function drawFeatureOnCanvas(geom, fill, stroke){
  const polys = geom.type === 'Polygon' ? [geom.coordinates]
              : geom.type === 'MultiPolygon' ? geom.coordinates : [];
  for (const dx of [-HEAT_W, 0, HEAT_W]){ // 处理横跨 180° 经线的国家
    for (const poly of polys){
      heatCtx.beginPath();
      for (const ring of poly){
        ring.forEach((p, i) => {
          const x = (p[0] + 180) / 360 * HEAT_W + dx;
          const y = (90 - p[1]) / 180 * HEAT_H;
          i ? heatCtx.lineTo(x, y) : heatCtx.moveTo(x, y);
        });
        heatCtx.closePath();
      }
      heatCtx.fillStyle = fill;
      heatCtx.fill('evenodd');
      heatCtx.strokeStyle = stroke;
      heatCtx.lineWidth = 1;
      heatCtx.stroke();
    }
  }
}

function drawHeatmap(){
  heatCtx.clearRect(0, 0, HEAT_W, HEAT_H);
  if (geoFeatures && state.showHeat){
    const isos = Object.keys(COUNTRY_DATA);
    const vals = isos.map(iso => metricValue(iso, state.metric, state.year)).filter(v => v != null && v > 0);
    const lo = Math.log10(Math.min(...vals)), hi = Math.log10(Math.max(...vals));
    for (const f of geoFeatures){
      const iso = f.id || f.properties?.ISO_A3 || f.properties?.ADM0_A3;
      const v = COUNTRY_DATA[iso] ? metricValue(iso, state.metric, state.year) : null;
      let fill;
      if (v == null || v <= 0) fill = 'rgba(70,85,110,0.20)';
      else fill = heatColor((Math.log10(v) - lo) / (hi - lo || 1));
      drawFeatureOnCanvas(f.geometry, fill, 'rgba(255,255,255,0.10)');
    }
    updateLegend(lo, hi);
  }
  heatTex.needsUpdate = true;
}

function updateLegend(lo, hi){
  const m = METRICS[state.metric];
  document.getElementById('legend-title').textContent = `${m.label}（${m.unit}） · ${state.year}`;
  document.getElementById('legend-min').textContent = lo != null ? m.fmt(Math.pow(10, lo)) : '–';
  document.getElementById('legend-max').textContent = hi != null ? m.fmt(Math.pow(10, hi)) : '–';
}
function countryNorm(iso){ // 该国当前指标归一化值（log）
  const v = metricValue(iso, state.metric, state.year);
  if (v == null || v <= 0) return 0;
  const vals = Object.keys(COUNTRY_DATA).map(k => metricValue(k, state.metric, state.year)).filter(x => x != null && x > 0);
  const lo = Math.log10(Math.min(...vals)), hi = Math.log10(Math.max(...vals));
  return (Math.log10(v) - lo) / (hi - lo || 1);
}

const cityByName = Object.fromEntries(CITIES.map(c => [c.name, c]));
const ARC_COLOR_A = new THREE.Color(0x4fc3f7);
const ARC_COLOR_B = new THREE.Color(0xff6ec7);

function buildArc(cityA, cityB){
  const v1 = latLonToVector3(cityA.lat, cityA.lng, R * 1.005);
  const v2 = latLonToVector3(cityB.lat, cityB.lng, R * 1.005);
  const chord = v1.distanceTo(v2);
  const mid = v1.clone().add(v2).normalize().multiplyScalar(R * (1 + 0.06 + chord * 0.22));
  return new THREE.QuadraticBezierCurve3(v1, mid, v2);
}

ROUTES.forEach(([a, b, baseFlights], idx) => {
  const cityA = cityByName[a], cityB = cityByName[b];
  const curve = buildArc(cityA, cityB);
  const route = { a: cityA, b: cityB, baseFlights, curve };

  // 渐变弧线
  const pts = curve.getPoints(64);
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const colors = new Float32Array(pts.length * 3);
  pts.forEach((_, i) => {
    const c = ARC_COLOR_A.clone().lerp(ARC_COLOR_B, i / (pts.length - 1));
    colors.set([c.r, c.g, c.b], i * 3);
  });
  g.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const line = new THREE.Line(g, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.55,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  arcsGroup.add(line);

  // 悬停拾取管道
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 32, 0.014, 6, false),
    new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
  );
  tube.userData = { type: 'arc', route };
  arcsGroup.add(tube);
  arcHitMeshes.push(tube);

  // 流动光点（每条航线 2 个，错相运动）
  for (let k = 0; k < 2; k++){
    const dot = new THREE.Sprite(new THREE.SpriteMaterial({
      map: glowTex, color: 0xeaffff, transparent: true,
      blending: THREE.AdditiveBlending, depthWrite: false,
    }));
    dot.scale.setScalar(0.03);
    arcsGroup.add(dot);
    flowDots.push({ sprite: dot, curve, t: k * 0.5 + Math.random() * 0.2,
                    speed: 0.10 + (idx % 5) * 0.012 });
  }
});

function hidePopup(){ selectedCity = null; popup.style.display = 'none'; }

const _pv = new THREE.Vector3();
function updatePopupPosition(){
  if (!selectedCity) return;
  _pv.copy(selectedCity.markerPos).applyMatrix4(globeGroup.matrixWorld);
  // 城市转到背面时隐藏弹窗
  const facing = _pv.clone().normalize().dot(camera.position.clone().normalize());
  if (facing < 0.08){ popup.style.display = 'none'; return; }
  popup.style.display = 'block';
  _pv.project(camera);
  const x = (_pv.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-_pv.y * 0.5 + 0.5) * window.innerHeight;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
}
document.getElementById('cp-close').addEventListener('click', hidePopup);

canvas.addEventListener('pointerdown', e => { pointerDownPos = [e.clientX, e.clientY]; });
canvas.addEventListener('pointerup', e => {
  if (!pointerDownPos) return;
  const moved = Math.hypot(e.clientX - pointerDownPos[0], e.clientY - pointerDownPos[1]);
  pointerDownPos = null;
  if (moved > 5) return; // 拖拽不触发点击
  setNDC(e);
  raycaster.setFromCamera(pointerNDC, camera);
  const hits = raycaster.intersectObjects(cityHitMeshes, false);
  if (hits.length) showPopup(hits[0].object.userData.city);
  else hidePopup();
});

let hoverQueued = false;
canvas.addEventListener('pointermove', e => {
  if (hoverQueued) return;
  hoverQueued = true;
  requestAnimationFrame(() => {
    hoverQueued = false;
    setNDC(e);
    raycaster.setFromCamera(pointerNDC, camera);
    const arcHits = state.showArcs ? raycaster.intersectObjects(arcHitMeshes, false) : [];
    const cityHits = state.showCities ? raycaster.intersectObjects(cityHitMeshes, false) : [];
    if (arcHits.length){
      const { route } = arcHits[0].object.userData;
      const flights = Math.max(1, Math.round(route.baseFlights * flightYearFactor(state.year)));
      const km = Math.round(haversineKm(route.a, route.b)).toLocaleString();
      arcTip.innerHTML = `<b>${route.a.name} ⇌ ${route.b.name}</b><br>每日约 ${flights} 班 · 航程 ${km} km · ${state.year} 年`;
      arcTip.style.left = e.clientX + 'px';
      arcTip.style.top = e.clientY + 'px';
      arcTip.style.display = 'block';
    } else {
      arcTip.style.display = 'none';
    }
    canvas.classList.toggle('pointing', arcHits.length > 0 || cityHits.length > 0);
  });
});
canvas.addEventListener('pointerleave', () => { arcTip.style.display = 'none'; });

controls.addEventListener('start', () => { userInteracting = true; canvas.classList.add('grabbing'); });
controls.addEventListener('end', () => { userInteracting = false; canvas.classList.remove('grabbing'); });

/* ============================================================
 * 7. 控制面板与时间轴
 * ============================================================ */
document.querySelectorAll('#metric-btns .mbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#metric-btns .mbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.metric = btn.dataset.metric;
    refreshDataLayer();
  });
});

const toggles = [
  ['tg-heat',   'showHeat',   v => { heatSphere.visible = v; drawHeatmap(); }],
  ['tg-cities', 'showCities', v => { markersGroup.visible = v; if (!v) hidePopup(); }],
  ['tg-arcs',   'showArcs',   v => { arcsGroup.visible = v; if (!v) arcTip.style.display = 'none'; }],
  ['tg-atmo',   'showAtmo',   v => { atmosphere.visible = v; }],
  ['tg-rotate', 'autoRotate', () => {}],
  ['tg-sun',    'realtimeSun',() => {}],
];
toggles.forEach(([id, key, fn]) => {
  document.getElementById(id).addEventListener('change', e => {
    state[key] = e.target.checked;
    fn(e.target.checked);
  });
});

const yearSlider = document.getElementById('year-slider');
const yearDisplay = document.getElementById('year-display');
const playBtn = document.getElementById('play-btn');
let playing = false, playTimer = null;

function setYear(y){
  state.year = y;
  yearSlider.value = y;
  yearDisplay.textContent = y;
  yearSlider.style.setProperty('--fill', ((y - YEAR_MIN) / (YEAR_MAX - YEAR_MIN) * 100) + '%');
  refreshDataLayer();
}
yearSlider.addEventListener('input', e => setYear(parseInt(e.target.value)));

playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? '❚❚' : '▶';
  if (playing){
    if (state.year >= YEAR_MAX) setYear(YEAR_MIN);
    playTimer = setInterval(() => {
      setYear(state.year >= YEAR_MAX ? YEAR_MIN : state.year + 1);
    }, 900);
  } else {
    clearInterval(playTimer);
  }
});

function refreshDataLayer(){
  drawHeatmap();
  // 城市标记尺寸随当前指标缩放
  citySprites.forEach((sprite, i) => {
    sprite.userData.baseScale = 0.032 + 0.05 * countryNorm(CITIES[i].c);
  });
  if (selectedCity) fillPopup(selectedCity);
  arcTip.style.display = 'none';
}

/* ============================================================
 * 8. 动画循环
 * ============================================================ */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  // 地球自转（拖拽时暂停）
  if (state.autoRotate && !userInteracting){
    globeGroup.rotation.y += dt * 0.045;
  }

  // 实时太阳方向
  if (state.realtimeSun){
    sunDir.copy(getSunDirection(new Date()));
  }

  // 城市标记脉冲
  if (state.showCities){
    for (const s of citySprites){
      const sc = s.userData.baseScale * (1 + 0.22 * Math.sin(t * 2.2 + s.userData.phase));
      s.scale.setScalar(sc);
    }
  }

  // 航线流动光点
  if (state.showArcs){
    for (const d of flowDots){
      d.t = (d.t + dt * d.speed) % 1;
      d.sprite.position.copy(d.curve.getPoint(d.t));
      const fade = Math.sin(d.t * Math.PI); // 两端淡出
      d.sprite.material.opacity = 0.35 + 0.65 * fade;
    }
  }

  updatePopupPosition();
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

setYear(2024);
animate();
</script>
