<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>

<title>GLOBAL PULSE · 3D 全球数据可视化地球仪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020617; --glass:rgba(6,14,32,.66); --line:rgba(110,180,255,.16);
  --txt:#dbeeff; --sub:#7fb4e8; --dim:#6f9cc4; --accent:#4dd8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:'Rajdhani','PingFang SC','Microsoft YaHei',system-ui,sans-serif;user-select:none}
#scene{position:fixed;inset:0;display:block;cursor:grab}
.glass{background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);box-shadow:0 8px 32px rgba(0,0,0,.45);border-radius:14px}

/* ---------- 标题 ---------- */
header{position:fixed;top:18px;left:20px;z-index:10;pointer-events:none}
header h1{font-family:Orbitron,'Rajdhani',sans-serif;font-size:21px;letter-spacing:2px;
  background:linear-gradient(90deg,#7dd8ff,#c084fc);-webkit-background-clip:text;background-clip:text;color:transparent}
header p{font-size:11px;letter-spacing:3px;color:var(--dim);margin-top:3px}

/* ---------- 左侧控制面板 ---------- */
#panel{position:fixed;top:92px;left:20px;width:242px;z-index:10;padding:14px 15px}
.sec{margin-bottom:14px}.sec:last-child{margin-bottom:2px}
.sec-t{font-size:10.5px;letter-spacing:2px;color:var(--sub);margin-bottom:8px}
.seg{display:flex;gap:6px}
.seg button{flex:1;padding:7px 0;font-size:12.5px;font-weight:700;letter-spacing:1px;color:#9cc6ea;
  background:rgba(255,255,255,.04);border:1px solid rgba(120,190,255,.18);border-radius:8px;cursor:pointer;transition:.25s}
.seg button:hover{border-color:rgba(120,200,255,.5)}
.seg button.active{background:linear-gradient(135deg,#0ea5e9,#7c3aed);color:#fff;border-color:transparent;
  box-shadow:0 0 14px rgba(56,189,248,.35)}
.swrow{display:flex;justify-content:space-between;align-items:center;margin:7px 0;font-size:12.5px;color:#bcd9f2}
.sw{position:relative;width:34px;height:18px;flex:none}
.sw input{opacity:0;width:0;height:0}
.sw .tr{position:absolute;inset:0;border-radius:10px;background:rgba(255,255,255,.12);transition:.25s;cursor:pointer}
.sw .tr:before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;border-radius:50%;
  background:#8fb7dd;transition:.25s}
.sw input:checked+.tr{background:linear-gradient(135deg,#0ea5e9,#7c3aed)}
.sw input:checked+.tr:before{transform:translateX(16px);background:#fff}
#legendBar{height:8px;border-radius:4px;margin-bottom:5px;
  background:linear-gradient(90deg,#12306e,#1d74c2 28%,#25cdb2 52%,#ffd166 78%,#ff5c5c)}
.leg-lab{display:flex;justify-content:space-between;font-size:10.5px;color:var(--dim)}
#statVal{font-family:Orbitron,sans-serif;font-size:22px;margin-top:2px;
  background:linear-gradient(90deg,#7dd8ff,#c084fc);-webkit-background-clip:text;background-clip:text;color:transparent}
#statLabel{font-size:11px;color:var(--dim);margin-top:2px}

/* ---------- 时间轴 ---------- */
#timeline{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;align-items:center;gap:13px;padding:10px 18px}
#playBtn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;font-size:13px;color:#021018;
  background:linear-gradient(135deg,#38bdf8,#a78bfa);box-shadow:0 0 16px rgba(56,189,248,.45);transition:.2s}
#playBtn:hover{transform:scale(1.08)}
#year{font-family:Orbitron,sans-serif;font-size:20px;color:#bfe6ff;width:66px;text-align:center}
#yearSlider{width:min(46vw,500px);-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;
  background:linear-gradient(90deg,#0ea5e9,#7c3aed)}
#yearSlider::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
  background:#fff;border:3px solid #38bdf8;box-shadow:0 0 10px rgba(56,189,248,.8);cursor:pointer}
#yearSlider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;border:3px solid #38bdf8;cursor:pointer}
.tl-lab{font-size:11px;color:var(--dim)}

/* ---------- 城市弹窗 ---------- */
#popup{position:fixed;top:92px;right:20px;width:272px;z-index:20;padding:16px;
  transform:translateX(130%);transition:transform .45s cubic-bezier(.22,1,.36,1)}
#popup.show{transform:translateX(0)}
#popClose{position:absolute;top:9px;right:11px;background:none;border:none;color:var(--sub);
  font-size:15px;cursor:pointer}
.p-head{display:flex;gap:10px;align-items:center;margin-bottom:4px}
.p-flag{font-size:26px}
.p-name{font-size:17px;font-weight:700;letter-spacing:1px}
.p-sub{font-size:11px;color:var(--dim);margin-top:1px}
.p-year{font-size:11px;color:var(--sub);letter-spacing:1px;margin:8px 0 2px}
.p-row{margin:9px 0}
.p-lab{display:flex;justify-content:space-between;font-size:11.5px;color:#8fb7dd}
.p-lab b{color:#eaf6ff;font-size:13px}
.p-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.08);margin-top:4px;overflow:hidden}
.p-fill{height:100%;border-radius:3px;transition:width .3s}
.p-note{font-size:11px;color:var(--dim);margin-top:10px;border-top:1px solid var(--line);padding-top:8px}

/* ---------- 悬停提示 ---------- */
#tooltip{position:fixed;z-index:30;display:none;pointer-events:none;max-width:250px;
  padding:8px 11px;font-size:12px;border-radius:9px}
.tt-t{font-weight:700;font-size:12.5px;color:#eaf6ff;letter-spacing:.5px}
.tt-r{color:#9fd0f5;margin-top:3px;line-height:1.5}

/* ---------- 标签 / 提示条 ---------- */
#labels{position:fixed;inset:0;z-index:5;pointer-events:none;overflow:hidden}
.lbl{position:absolute;transform:translate(-50%,-140%);white-space:nowrap;font-size:11px;letter-spacing:.5px;
  color:#cfe9ff;background:rgba(4,12,30,.55);border:1px solid rgba(120,190,255,.25);
  padding:2px 7px;border-radius:4px;text-shadow:0 1px 3px #000}
#hint{position:fixed;bottom:22px;left:20px;z-index:10;font-size:11px;color:var(--dim);letter-spacing:.5px}

/* ---------- 加载层 ---------- */
#loading{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;transition:opacity .6s}
#loading.done{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border-radius:50%;border:3px solid rgba(90,170,255,.18);
  border-top-color:var(--accent);animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#loadTxt{font-size:12.5px;color:var(--sub);letter-spacing:1px}
@media(max-width:820px){
  #panel{width:200px;top:80px;left:10px}
  #hint{display:none}
  header p{display:none}
  #popup{width:236px;right:10px}
}
</style>

/* 国家数据 ISO3 -> [GDP(十亿美元,2023), 人口(百万)]，未列出的国家用哈希生成 */
const CTRY={USA:[27360,335],CHN:[17790,1412],JPN:[4210,124],DEU:[4460,84],IND:[3570,1428],GBR:[3340,68],FRA:[3030,68],ITA:[2250,59],BRA:[2170,216],CAN:[2140,40],RUS:[2020,144],MEX:[1790,128],AUS:[1720,26],KOR:[1710,52],ESP:[1580,48],IDN:[1370,277],NLD:[1120,18],TUR:[1110,85],SAU:[1070,36],CHE:[880,9],ARG:[630,46],SWE:[590,10],POL:[810,37],BEL:[630,12],THA:[515,72],AUT:[570,9],IRL:[530,5],ISR:[520,9],SGP:[500,6],ARE:[510,10],MYS:[430,34],VNM:[430,98],PHL:[440,117],EGY:[395,113],ZAF:[380,60],COL:[360,52],CHL:[335,20],CZE:[330,11],ROU:[350,19],PRT:[287,10],NZL:[250,5],GRC:[238,10],HUN:[203,10],UKR:[178,37],FIN:[300,6],DNK:[404,6],NOR:[486,5],PAK:[340,240],BGD:[450,173],NGA:[360,224],ETH:[160,127],KEN:[115,55],GHA:[80,34],TZA:[80,67],AGO:[90,36],COD:[65,102],DZA:[240,45],MAR:[140,37],TUN:[50,12],IRQ:[250,44],IRN:[400,89],KAZ:[260,20],UZB:[90,35],PER:[270,34],ECU:[120,18],VEN:[100,28],BOL:[45,12],PRY:[45,7],URY:[80,3],CUB:[100,11],DOM:[120,11],GTM:[100,18],HND:[35,10],SLV:[35,6],NIC:[17,7],CRI:[90,5],PAN:[80,4],JAM:[18,3],MMR:[65,54],KHM:[30,17],LAO:[15,7],NPL:[40,30],LKA:[85,22],AFG:[17,42],GEO:[30,4],ARM:[24,3],AZE:[70,10],BLR:[70,9],SRB:[80,7],BIH:[28,3],HRV:[80,4],SVK:[130,5],SVN:[70,2],BGR:[100,6],MKD:[15,2],ALB:[25,3],LTU:[80,3],LVA:[45,2],EST:[40,1],ISL:[30,0.4],LUX:[87,0.66],CYP:[30,1.2],MNG:[20,3.4],JOR:[50,11],LBN:[20,5.5],SYR:[10,22],YEM:[20,34],OMN:[110,4.6],KWT:[160,4.3],QAT:[240,2.7],BHR:[45,1.5],BRN:[15,0.45],PNG:[30,10],FJI:[5,0.9],BWA:[20,2.6],NAM:[13,2.6],ZMB:[30,20],ZWE:[30,16],MOZ:[20,33],MDG:[16,30],CMR:[50,28],CIV:[80,29],SEN:[30,18],MLI:[20,23],BFA:[20,23],NER:[17,27],TCD:[13,18],COG:[15,6],GAB:[20,2.4],RWA:[14,14],UGA:[50,48],SOM:[10,18],LBY:[50,7],SDN:[30,48],SSD:[5,11],HTI:[20,12]};

/* ==================== 2. 工具函数 ==================== */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const smooth=t=>t*t*(3-2*t);
function hash01(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return((h>>>0)%10000)/10000;}
/* 2020-2021 疫情对航班的冲击 */
const pandemicDip=y=>1-0.62*Math.exp(-Math.pow((y-2020.2)/0.7,2));
const gdpDip=y=>1-0.05*Math.exp(-Math.pow((y-2020.2)/0.7,2));
/* 经纬度 -> 球面坐标 (与 three-globe 纹理映射一致) */
function llToV(lat,lon,r=1){
  const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
/* 热力色带 */
const STOPS=[[0,[18,48,110]],[.28,[29,116,194]],[.52,[37,205,178]],[.78,[255,209,102]],[1,[255,92,92]]];
function ramp(t){
  t=clamp(t,0,1);
  for(let i=1;i<STOPS.length;i++){
    if(t<=STOPS[i][0]){
      const [t0,c0]=STOPS[i-1],[t1,c1]=STOPS[i],k=(t-t0)/(t1-t0);
      return [0,1,2].map(j=>Math.round(c0[j]+(c1[j]-c0[j])*k));
    }
  }
  return STOPS[STOPS.length-1][1];
}
function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLa=(lat2-lat1)*Math.PI/180,dLo=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLo/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(a)));
}
/* 数据模型 */
function cityValue(c,m,y){
  const base=m==='pop'?c[6]:m==='gdp'?c[7]:c[8];
  const g=m==='pop'?c[9]:m==='gdp'?c[10]:c[11];
  let v=base*Math.pow(1+g,y-2000);
  if(m==='flights')v*=pandemicDip(y);
  if(m==='gdp')v*=gdpDip(y);
  return v;
}
function routeVol(r,y){return r[2]*Math.pow(1.028,y-2025)*pandemicDip(y);}

const R=100;

let markers=[],routeObjs=[],pickables=[],labelEls=[];
let features=[],DOM={},CDOM={},RDOM=[];
let heatCtx,heatTex,lastHeatYear=-99;
let sunLon=70,sunDecl=20.4,sunDirL=new THREE.Vector3(),sunDirW=new THREE.Vector3();
let hoverPick=null,flyAnim=null,lastInteract=0,routeTime=0;
const clock=new THREE.Clock();
const raycaster=new THREE.Raycaster();
const pointer=new THREE.Vector2(-9,-9);
let pointerPx={x:0,y:0};
const $=id=>document.getElementById(id);

/* ==================== 4. 初始化 ==================== */
const loadTxt=$('loadTxt');
async function init(){
  /* --- 渲染器 / 场景 / 相机 --- */
  renderer=new THREE.WebGLRenderer({canvas:$('scene'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,1,12000);
  camera.position.set(150,95,235).normalize().multiplyScalar(285);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=.07;
  controls.enablePan=false;controls.minDistance=128;controls.maxDistance=560;
  controls.autoRotateSpeed=.55;
  controls.addEventListener('start',()=>{lastInteract=clock.elapsedTime;flyAnim=null;controls.enabled=true;});
  controls.addEventListener('end',()=>{lastInteract=clock.elapsedTime;});

  earthGroup=new THREE.Group();
  earthGroup.rotation.z=-23.4*Math.PI/180;   // 地轴倾角
  scene.add(earthGroup);
  routesGroup=new THREE.Group();earthGroup.add(routesGroup);

  /* --- 加载纹理 (失败时使用程序化兜底) --- */
  loadTxt.textContent='正在加载地球纹理…';
  const loader=new THREE.TextureLoader();loader.setCrossOrigin('anonymous');
  const loadTex=url=>new Promise(res=>loader.load(url,t=>res(t),undefined,()=>res(null)));
  const IMG='https://cdn.jsdelivr.net/gh/vasturiano/three-globe/example/img/';
  let [dayT,nightT]=await Promise.all([loadTex(IMG+'earth-blue-marble.jpg'),loadTex(IMG+'earth-night.jpg')]);
  if(!dayT){loadTxt.textContent='纹理加载失败，使用程序化纹理…';dayT=procDay();}
  if(!nightT)nightT=procNight();
  dayT.colorSpace=THREE.SRGBColorSpace;nightT.colorSpace=THREE.SRGBColorSpace;
  dayT.anisotropy=nightT.anisotropy=Math.min(8,renderer.capabilities.getMaxAnisotropy());

  buildStars();
  buildEarth(dayT,nightT);
  buildAtmosphere();
  buildCities();
  buildRoutes();

  /* --- 国家边界 GeoJSON (热力层) --- */
  loadTxt.textContent='正在加载国家边界…';
  try{
    const gj=await (await fetch('https://cdn.jsdelivr.net/gh/vasturiano/three-globe/example/hexed-polygons/ne_110m_admin_0_countries.geojson')).json();
    features=gj.features;
    features.forEach(f=>{
      const iso=f.properties.ISO_A3,name=f.properties.NAME||iso;
      f.__key=(iso&&iso!=='-99')?iso:name;
      f.__g={gdp:.02+.05*hash01(f.__key+'g'),pop:(hash01(f.__key+'p')-.15)*.02,flights:.02+.04*hash01(f.__key+'f')};
      const b=CTRY[f.__key]||[3+Math.pow(hash01(f.__key+'A'),2)*280,.4+Math.pow(hash01(f.__key+'B'),2)*60];
      f.__b={gdp:b[0],pop:b[1],flights:(b[0]*.5+b[1]*2.2)*1.6*(.6+.8*hash01(f.__key+'F'))};
      f.__v={gdp:0,pop:0,flights:0};
    });
    buildHeatLayer();
  }catch(e){
    loadTxt.textContent='国家边界加载失败，热力层已禁用';
    $('tgHeat').checked=false;state.heat=false;
    await new Promise(r=>setTimeout(r,900));
  }

  computeDomains();
  buildLabels();
  bindUI();
  setMetric('gdp');
  updateYear(true);

  loadTxt.textContent='完成';
  setTimeout(()=>$('loading').classList.add('done'),300);
  animate();
}

/* 程序化兜底纹理 */
function procDay(){
  const c=document.createElement('canvas');c.width=1024;c.height=512;const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,512);g.addColorStop(0,'#0b3d66');g.addColorStop(.5,'#0e4d7e');g.addColorStop(1,'#0b3d66');
  x.fillStyle=g;x.fillRect(0,0,1024,512);
  x.fillStyle='#2c5e3f';
  for(let i=0;i<40;i++){x.beginPath();x.ellipse(Math.random()*1024,120+Math.random()*280,20+Math.random()*70,15+Math.random()*45,Math.random()*3,0,7);x.fill();}
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;
}
function procNight(){
  const c=document.createElement('canvas');c.width=1024;c.height=512;const x=c.getContext('2d');
  x.fillStyle='#010208';x.fillRect(0,0,1024,512);
  for(let i=0;i<2500;i++){x.fillStyle=`rgba(255,200,110,${.2+Math.random()*.8})`;
    x.fillRect(Math.random()*1024,100+Math.random()*300,1.3,1.3);}
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;
}

/* ==================== 5. 星空 ==================== */
function buildStars(){
  const N=3200,pos=new Float32Array(N*3),col=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const v=new THREE.Vector3().randomDirection().multiplyScalar(2600+Math.random()*1800);
    pos.set([v.x,v.y,v.z],i*3);
    const b=.3+Math.random()*.7,t=Math.random();
    col.set([b*(t<.3?.75:1),b*(t<.3?.85:t>.7?.9:1),b],i*3);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:2,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:.9,depthWrite:false})));
}

/* ==================== 6. 地球 (日夜混合着色器) ==================== */
function buildEarth(dayT,nightT){
  earthMat=new THREE.ShaderMaterial({
    uniforms:{uDay:{value:dayT},uNight:{value:nightT},uSun:{value:new THREE.Vector3(1,0,0)}},
    vertexShader:`
      varying vec2 vUv; varying vec3 vN; varying vec3 vWP;
      void main(){
        vUv=uv;
        vN=normalize(mat3(modelMatrix)*normal);
        vec4 wp=modelMatrix*vec4(position,1.0);
        vWP=wp.xyz;
        gl_Position=projectionMatrix*viewMatrix*wp;
      }`,
    fragmentShader:`
      uniform sampler2D uDay,uNight; uniform vec3 uSun;
      varying vec2 vUv; varying vec3 vN; varying vec3 vWP;
      void main(){
        vec3 n=normalize(vN);
        float ndl=dot(n,normalize(uSun));
        float dayK=smoothstep(-0.06,0.28,ndl);
        vec3 day=texture2D(uDay,vUv).rgb;
        vec3 night=texture2D(uNight,vUv).rgb;
        /* 夜面城市灯光 (暖色增强) */
        vec3 lights=pow(night,vec3(1.3))*vec3(1.0,0.82,0.55)*2.0;
        vec3 col=mix(lights, day*(0.22+0.92*max(ndl,0.0)), dayK);
        /* 晨昏线橙色暮光 */
        float tw=exp(-pow((ndl-0.03)*5.5,2.0));
        col+=vec3(0.85,0.42,0.16)*tw*0.22;
        /* 大气边缘辉光 */
        vec3 vd=normalize(cameraPosition-vWP);
        float fr=pow(1.0-max(dot(n,vd),0.0),3.2);
        col+=vec3(0.22,0.5,1.0)*fr*(0.22+0.78*dayK)*0.9;
        gl_FragColor=vec4(col,1.0);
        #include <tonemapping_fragment>
        #include <colorspace_fragment>
      }`
  });
  earthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(R,128,128),earthMat));
}

/* ==================== 7. 大气光晕 ==================== */
function buildAtmosphere(){
  atmoMat=new THREE.ShaderMaterial({
    uniforms:{uSun:{value:new THREE.Vector3(1,0,0)}},
    vertexShader:`
      varying vec3 vNv; varying vec3 vNw;
      void main(){
        vNv=normalize(normalMatrix*normal);
        vNw=normalize(mat3(modelMatrix)*normal);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
      }`,
    fragmentShader:`
      uniform vec3 uSun; varying vec3 vNv; varying vec3 vNw;
      void main(){
        float i=pow(0.68-dot(vNv,vec3(0.0,0.0,1.0)),3.6);
        float sk=0.45+0.55*smoothstep(-0.25,0.55,dot(vNw,normalize(uSun)));
        gl_FragColor=vec4(vec3(0.30,0.58,1.0)*i*sk*1.35,i);
      }`,
    side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false
  });
  atmoMesh=new THREE.Mesh(new THREE.SphereGeometry(R*1.16,64,64),atmoMat);
  scene.add(atmoMesh);
}

/* ==================== 8. 城市标记 (发光点) ==================== */
function glowTexture(){
  const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  const g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.25,'rgba(255,255,255,.55)');g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
function buildCities(){
  const gTex=glowTexture();
  CITIES.forEach((c,i)=>{
    const g=new THREE.Group();
    g.position.copy(llToV(c[4],c[5],R+0.4));
    const core=new THREE.Mesh(new THREE.SphereGeometry(1,12,12),new THREE.MeshBasicMaterial({color:METRICS.gdp.color}));
    const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:gTex,color:METRICS.gdp.color,transparent:true,
      blending:THREE.AdditiveBlending,depthWrite:false,opacity:.8}));
    const hit=new THREE.Mesh(new THREE.SphereGeometry(3,8,8),
      new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false,colorWrite:false}));
    hit.userData.pick={type:'city',idx:i};
    g.add(core,glow,hit);earthGroup.add(g);
    markers.push({g,core,glow,hit,base:1,phase:Math.random()*6.28});
    pickables.push(hit);
  });
}

/* ==================== 9. 航线 (弧线 + 流动动画) ==================== */
function arcPoints(a,b){
  const va=llToV(a[4],a[5],1),vb=llToV(b[4],b[5],1);
  const ang=va.angleTo(vb),alt=R*(0.18+ang*0.35),N=72,pts=[];
  for(let i=0;i<=N;i++){
    const t=i/N;
    const p=va.clone().multiplyScalar(Math.sin((1-t)*ang)).add(vb.clone().multiplyScalar(Math.sin(t*ang)))
      .divideScalar(Math.sin(ang)).normalize().multiplyScalar(R+Math.sin(Math.PI*t)*alt);
    pts.push(p);
  }
  return pts;
}
function buildRoutes(){
  const routeVert=`varying float vT;void main(){vT=uv.x;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;
  const routeFrag=`
    uniform vec3 uColor;uniform float uTime,uSpeed,uPhase,uInt,uHover;
    varying float vT;
    void main(){
      float endF=smoothstep(0.0,0.06,vT)*smoothstep(1.0,0.94,vT);
      float f1=fract(vT*1.6-uTime*uSpeed+uPhase);
      float f2=fract(vT*1.6-uTime*uSpeed+uPhase+0.5);
      float comet=exp(-f1*7.0)+0.8*exp(-f2*9.0);
      float a=(0.16+0.10*uInt+comet*(0.55+0.75*uInt))*(1.0+uHover*1.6)*endF;
      gl_FragColor=vec4(uColor*(0.75+1.6*comet)*(1.0+uHover*0.7),a);
      #include <colorspace_fragment>
    }`;
  ROUTES.forEach(r=>{
    const a=CITIES[CITY_IDX[r[0]]],b=CITIES[CITY_IDX[r[1]]];
    const curve=new THREE.CatmullRomCurve3(arcPoints(a,b));
    const geo=new THREE.TubeGeometry(curve,96,0.55,6,false);
    const mat=new THREE.ShaderMaterial({
      uniforms:{uColor:{value:new THREE.Color()},uTime:{value:0},uSpeed:{value:.3},
        uPhase:{value:hash01(r[0]+r[1])},uInt:{value:.5},uHover:{value:0}},
      vertexShader:routeVert,fragmentShader:routeFrag,
      transparent:true,blending:THREE.AdditiveBlending,depthWrite:false
    });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.userData.pick={type:'route',r};
    mesh.renderOrder=2;routesGroup.add(mesh);
    routeObjs.push({mesh,r,dist:haversine(a[4],a[5],b[4],b[5])});
    pickables.push(mesh);
  });
}

/* ==================== 10. 国家热力层 (Canvas 纹理) ==================== */
function buildHeatLayer(){
  const c=document.createElement('canvas');c.width=2048;c.height=1024;
  heatCtx=c.getContext('2d');
  heatTex=new THREE.CanvasTexture(c);
  heatTex.colorSpace=THREE.SRGBColorSpace;
  heatMesh=new THREE.Mesh(new THREE.SphereGeometry(R*1.004,96,96),
    new THREE.MeshBasicMaterial({map:heatTex,transparent:true,depthWrite:false}));
  heatMesh.renderOrder=1;earthGroup.add(heatMesh);
}
function traceFeature(x,f){
  const W=2048,H=1024,geom=f.geometry;
  const polys=geom.type==='Polygon'?[geom.coordinates]:geom.coordinates;
  x.beginPath();
  for(const poly of polys)for(const ring of poly){
    for(let i=0;i<ring.length;i++){
      const px=(ring[i][0]+180)/360*W,py=(90-ring[i][1])/180*H;
      i?x.lineTo(px,py):x.moveTo(px,py);
    }
    x.closePath();
  }
}
function drawHeat(y){
  if(!heatCtx)return;
  const x=heatCtx,m=state.metric;
  x.clearRect(0,0,2048,1024);
  for(const f of features){
    f.__v.gdp=f.__b.gdp*Math.pow(1+f.__g.gdp,y-2023)*gdpDip(y);
    f.__v.pop=f.__b.pop*Math.pow(1+f.__g.pop,y-2023);
    f.__v.flights=f.__b.flights*Math.pow(1+f.__g.flights,y-2023)*pandemicDip(y);
    const [lo,hi]=DOM[m];
    const t=clamp((Math.log10(f.__v[m])-lo)/(hi-lo),0,1);
    const [r,g,b]=ramp(t);
    x.fillStyle=`rgba(${r},${g},${b},${(0.22+0.5*t).toFixed(3)})`;
    traceFeature(x,f);x.fill('evenodd');
  }
  x.strokeStyle='rgba(190,225,255,0.15)';x.lineWidth=1;
  for(const f of features){traceFeature(x,f);x.stroke();}
  heatTex.needsUpdate=true;
  /* 全球统计 */
  const total=features.reduce((s,f)=>s+f.__v[m],0);
  $('statVal').textContent=METRICS[m].fmt(total)+(m==='flights'?' 班/日':'');
  $('statLabel').textContent=METRICS[m].stat+' · '+Math.round(y)+' 年';
}

/* ==================== 11. 数值域 (固定跨年归一化) ==================== */
function computeDomains(){
  for(const m of ['gdp','pop','flights']){
    let lo=99,hi=-99;
    for(let y=2000;y<=2025;y++)for(const f of features){
      const v=m==='gdp'?f.__b.gdp*Math.pow(1+f.__g.gdp,y-2023)*gdpDip(y)
        :m==='pop'?f.__b.pop*Math.pow(1+f.__g.pop,y-2023)
        :f.__b.flights*Math.pow(1+f.__g.flights,y-2023)*pandemicDip(y);
      const l=Math.log10(v);if(l<lo)lo=l;if(l>hi)hi=l;
    }
    DOM[m]=[lo,hi];
    let clo=99,chi=-99;
    for(let y=2000;y<=2025;y++)for(const c of CITIES){
      const l=Math.log10(cityValue(c,m,y));if(l<clo)clo=l;if(l>chi)chi=l;
    }
    CDOM[m]=[clo,chi];
  }
  let rlo=99,rhi=-99;
  for(const r of ROUTES){const l=Math.log10(r[2]);if(l<rlo)rlo=l;if(l>rhi)rhi=l;}
  RDOM=[rlo,rhi];
}

/* ==================== 12. 标签 ==================== */
function buildLabels(){
  const box=$('labels');
  CITIES.forEach(c=>{
    const el=document.createElement('div');el.className='lbl';el.textContent=c[1];
    box.appendChild(el);labelEls.push(el);
  });
}
const _wp=new THREE.Vector3(),_sp=new THREE.Vector3();
function updateLabels(){
  const camN=camera.position.clone().normalize();
  CITIES.forEach((c,i)=>{
    const el=labelEls[i];
    if(!state.labels){el.style.display='none';return;}
    markers[i].g.getWorldPosition(_wp);
    const facing=_wp.clone().normalize().dot(camN);
    if(facing<0.22){el.style.display='none';return;}
    _sp.copy(_wp).project(camera);
    if(_sp.z>1){el.style.display='none';return;}
    el.style.display='block';
    el.style.opacity=clamp((facing-0.22)*3,0,1);
    el.style.left=((_sp.x*.5+.5)*innerWidth)+'px';
    el.style.top=((-_sp.y*.5+.5)*innerHeight)+'px';
  });
}

/* ==================== 13. 指标 / 年份更新 ==================== */
function setMetric(m){
  state.metric=m;
  document.querySelectorAll('#metricSeg button').forEach(b=>b.classList.toggle('active',b.dataset.m===m));
  const col=new THREE.Color(METRICS[m].color);
  markers.forEach(o=>{o.core.material.color.copy(col);o.glow.material.color.copy(col);});
  $('legMin').textContent=METRICS[m].fmt(Math.pow(10,DOM[m][0]));
  $('legMax').textContent=METRICS[m].fmt(Math.pow(10,DOM[m][1]));
  updateMarkerSizes();
  updateYear(true);
  if(state.sel!=null)renderPopup();
}
function updateMarkerSizes(){
  const m=state.metric,[lo,hi]=CDOM[m];
  CITIES.forEach((c,i)=>{
    const t=clamp((Math.log10(cityValue(c,m,state.year))-lo)/(hi-lo),0,1);
    markers[i].base=0.9+2.0*Math.sqrt(t);
  });
}
function updateRouteStyle(){
  const cA=new THREE.Color('#38bdf8'),cB=new THREE.Color('#ff7ad9');
  routeObjs.forEach(o=>{
    const vol=routeVol(o.r,state.year);
    const t=clamp((Math.log10(vol)-RDOM[0])/(RDOM[1]-RDOM[0]),0,1);
    o.mesh.material.uniforms.uInt.value=t;
    o.mesh.material.uniforms.uSpeed.value=0.22+0.3*t;
    o.mesh.material.uniforms.uColor.value.copy(cA).lerp(cB,t);
    o.vol=vol;
  });
}
function updateYear(force=false){
  if(force||Math.abs(state.year-lastHeatYear)>=0.08){
    drawHeat(state.year);lastHeatYear=state.year;
  }
  updateMarkerSizes();
  updateRouteStyle();
  $('year').textContent=Math.round(state.year);
  if(state.sel!=null)renderPopupNumbers();
}

/* ==================== 14. 交互 (悬停 / 点击 / 飞行) ==================== */
function setHover(p){
  hoverPick=p;
  renderer.domElement.style.cursor=p?'pointer':'grab';
  const tt=$('tooltip');
  if(!p){tt.style.display='none';return;}
  let html='';
  if(p.type==='city'){
    const c=CITIES[p.idx];
    html=`<div class="tt-t">${c[3]} ${c[1]} · ${c[2]}</div><div class="tt-r">点击查看详情</div>`;
  }else{
    const a=CITIES[CITY_IDX[p.r[0]]],b=CITIES[CITY_IDX[p.r[1]]];
    const o=routeObjs.find(o=>o.r===p.r);
    html=`<div class="tt-t">✈ ${a[1]} ⇌ ${b[1]}</div>
      <div class="tt-r">${Math.round(state.year)} 年 · 日均约 ${Math.max(1,Math.round(o.vol))} 班<br>大圆距离 ${o.dist.toLocaleString()} km</div>`;
  }
  tt.innerHTML=html;tt.style.display='block';
  tt.style.left=clamp(pointerPx.x+16,8,innerWidth-260)+'px';
  tt.style.top=clamp(pointerPx.y+14,8,innerHeight-110)+'px';
}
function updateHover(){
  if(pointer.x<-5){if(hoverPick)setHover(null);return;}
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(pickables,false);
  setHover(hits.length?hits[0].object.userData.pick:null);
}
function handleClick(){
  raycaster.setFromCamera(pointer,camera);
  const hits=raycaster.intersectObjects(pickables,false);
  if(hits.length&&hits[0].object.userData.pick.type==='city'){
    openPopup(hits[0].object.userData.pick.idx);
  }else closePopup();
}
function flyTo(idx){
  const target=markers[idx].g.position.clone().applyMatrix4(earthGroup.matrixWorld).normalize();
  const start=camera.position.clone().normalize();
  flyAnim={startPos:camera.position.clone(),
    endQ:new THREE.Quaternion().setFromUnitVectors(start,target),
    idQ:new THREE.Quaternion(),t:0};
  controls.enabled=false;
}
/* --- 城市弹窗 --- */
function openPopup(idx){state.sel=idx;renderPopup();$('popup').classList.add('show');flyTo(idx);}
function closePopup(){state.sel=null;$('popup').classList.remove('show');}
function renderPopup(){
  const c=CITIES[state.sel];
  const routesN=ROUTES.filter(r=>r[0]===c[0]||r[1]===c[0]).length;
  $('popBody').innerHTML=`
    <div class="p-head"><span class="p-flag">${c[3]}</span>
      <div><div class="p-name">${c[1]}</div>
      <div class="p-sub">${c[2]} · ${c[4].toFixed(1)}°${c[4]>=0?'N':'S'} ${c[5].toFixed(1)}°${c[5]>=0?'E':'W'}</div></div></div>
    <div class="p-year" id="popYear"></div>
    ${['gdp','pop','flights'].map(m=>`
      <div class="p-row"><div class="p-lab"><span>${METRICS[m].label}</span><b id="pv_${m}">-</b></div>
      <div class="p-bar"><div class="p-fill" id="pb_${m}" style="background:${METRICS[m].color}"></div></div></div>`).join('')}
    <div class="p-note">关联航线 ${routesN} 条 · 悬停航线可查看航班信息</div>`;
  renderPopupNumbers();
}
function renderPopupNumbers(){
  if(state.sel==null)return;
  const c=CITIES[state.sel];
  $('popYear').textContent=Math.round(state.year)+' 年数据';
  for(const m of ['gdp','pop','flights']){
    const v=cityValue(c,m,state.year),[lo,hi]=CDOM[m];
    const t=clamp((Math.log10(v)-lo)/(hi-lo),0,1);
    $('pv_'+m).textContent=METRICS[m].fmt(v);
    $('pb_'+m).style.width=(t*100).toFixed(1)+'%';
  }
}

/* ==================== 15. UI 绑定 ==================== */
function bindUI(){
  const cv=renderer.domElement;
  cv.addEventListener('pointermove',e=>{
    pointerPx={x:e.clientX,y:e.clientY};
    pointer.x=e.clientX/innerWidth*2-1;pointer.y=-(e.clientY/innerHeight)*2+1;
  });
  cv.addEventListener('pointerleave',()=>{pointer.set(-9,-9);});
  let down=null;
  cv.addEventListener('pointerdown',e=>{down={x:e.clientX,y:e.clientY,t:performance.now()};lastInteract=clock.elapsedTime;});
  cv.addEventListener('pointerup',e=>{
    if(down&&Math.hypot(e.clientX-down.x,e.clientY-down.y)<6&&performance.now()-down.t<350)handleClick();
    down=null;
  });
  cv.addEventListener('wheel',()=>{lastInteract=clock.elapsedTime;},{passive:true});

  document.querySelectorAll('#metricSeg button').forEach(b=>b.onclick=()=>setMetric(b.dataset.m));
  $('tgRoutes').onchange=e=>{
    state.routes=e.target.checked;routesGroup.visible=state.routes;
    pickables=markers.map(o=>o.hit).concat(state.routes?routeObjs.map(o=>o.mesh):[]);
    if(!state.routes)setHover(null);
  };
  $('tgHeat').onchange=e=>{state.heat=e.target.checked;if(heatMesh)heatMesh.visible=state.heat;};
  $('tgLabels').onchange=e=>{state.labels=e.target.checked;};
  $('tgAuto').onchange=e=>{state.auto=e.target.checked;};
  $('popClose').onclick=closePopup;

  const slider=$('yearSlider'),play=$('playBtn');
  slider.addEventListener('input',()=>{state.year=parseFloat(slider.value);updateYear();});
  play.onclick=()=>{state.playing=!state.playing;play.textContent=state.playing?'❚❚':'▶';};
  addEventListener('keydown',e=>{
    if(e.code==='Space'&&e.target===document.body){e.preventDefault();play.onclick();}
  });
  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}

/* ==================== 16. 主循环 ==================== */
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05),t=clock.elapsedTime;

  /* 时间轴播放 */
  if(state.playing){
    state.year+=dt*1.1;
    if(state.year>2025.99)state.year=2000;
    $('yearSlider').value=state.year;
    updateYear();
  }

  /* 太阳位置 -> 日夜分界线 (约 50 秒一天) */
  sunLon-=dt*(360/50);
  sunDirL.copy(llToV(sunDecl,sunLon,1));
  sunDirW.copy(sunDirL).applyQuaternion(earthGroup.quaternion);
  earthMat.uniforms.uSun.value.copy(sunDirW);
  atmoMat.uniforms.uSun.value.copy(sunDirW);

  /* 相机飞行动画 */
  if(flyAnim){
    flyAnim.t+=dt/0.9;
    const e=smooth(clamp(flyAnim.t,0,1));
    const q=new THREE.Quaternion().slerpQuaternions(flyAnim.idQ,flyAnim.endQ,e);
    camera.position.copy(flyAnim.startPos).applyQuaternion(q);
    camera.lookAt(0,0,0);
    if(flyAnim.t>=1){flyAnim=null;controls.enabled=true;controls.update();}
  }else{
    controls.autoRotate=state.auto&&(t-lastInteract>2.5);
    controls.update();
  }

  /* 城市标记: 脉冲 + 夜面增亮 */
  const camN=camera.position.clone().normalize();
  markers.forEach(o=>{
    const n=o.g.position.clone().normalize();
    const ndl=n.dot(sunDirL);
    const nightK=smooth(clamp((0.06-ndl)/0.28,0,1));
    const pulse=1+0.1*Math.sin(t*2.2+o.phase);
    o.core.scale.setScalar(0.55*o.base*pulse);
    o.glow.material.opacity=0.5+0.5*nightK;
    o.glow.scale.setScalar(o.base*4.2*pulse*(1+0.3*nightK));
    const wp=o.g.getWorldPosition(_wp).normalize();
    o.glow.visible=wp.dot(camN)>-0.08;
  });

  /* 航线流动 */
  routeTime+=dt;
  const hoverRoute=hoverPick&&hoverPick.type==='route'?hoverPick.r:null;
  routeObjs.forEach(o=>{
    const u=o.mesh.material.uniforms;
    u.uTime.value=routeTime;
    u.uHover.value+=((o.r===hoverRoute?1:0)-u.uHover.value)*Math.min(1,dt*10);
  });

  updateHover();
  updateLabels();
  renderer.render(scene,camera);
}

init().catch(err=>{
  console.error(err);
  loadTxt.textContent='初始化失败: '+err.message+' (请检查网络后刷新)';
});
</script>
