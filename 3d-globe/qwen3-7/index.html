<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 数据可视化地球仪</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--panel:rgba(10,14,30,.88);--border:rgba(80,140,255,.25);
  --accent:#4da6ff;--accent2:#00e5ff;--glow:rgba(77,166,255,.4);
  --text:#e0e8ff;--dim:#6880a8;--danger:#ff4466;--success:#00e676;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text)}
canvas{display:block}

/* ---- Loading ---- */
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
#loader.hidden{opacity:0;pointer-events:none}
.spinner{width:60px;height:60px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{margin-top:18px;color:var(--dim);font-size:14px;letter-spacing:1px}

/* ---- Control Panel ---- */
#panel{position:fixed;top:20px;left:20px;width:280px;background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:16px;padding:20px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5);user-select:none}
#panel h2{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--accent2);letter-spacing:.5px;display:flex;align-items:center;gap:8px}
#panel h2::before{content:'';display:inline-block;width:8px;height:8px;background:var(--accent2);border-radius:50%;box-shadow:0 0 8px var(--accent2)}
.ctrl-group{margin-bottom:16px}
.ctrl-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin-bottom:6px}
.ctrl-group select,.ctrl-group input[type=range]{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;cursor:pointer}
.ctrl-group select:focus{border-color:var(--accent)}
.ctrl-group select option{background:#151a2e;color:var(--text)}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,.1);padding:0;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 10px var(--glow)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.toggle-row span{font-size:13px}
.toggle{position:relative;width:40px;height:22px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:11px;transition:.3s}
.toggle .slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider::before{transform:translateX(18px)}

/* ---- Timeline ---- */
#timeline{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:14px;padding:14px 24px;display:flex;align-items:center;gap:16px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#timeline .year{font-size:22px;font-weight:700;color:var(--accent2);min-width:52px;text-align:center}
#timeline input[type=range]{width:320px}
#playBtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--accent);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
#playBtn:hover{background:var(--accent);color:#fff}

/* ---- Tooltip / Popup ---- */
#tooltip{position:fixed;pointer-events:none;background:var(--panel);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:12px;z-index:200;opacity:0;transition:opacity .2s;max-width:220px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#tooltip.show{opacity:1}
#tooltip .tt-title{font-weight:600;color:var(--accent2);margin-bottom:4px;font-size:13px}
#tooltip .tt-row{display:flex;justify-content:space-between;gap:12px;padding:2px 0;color:var(--dim)}
#tooltip .tt-row span:last-child{color:var(--text)}

#popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);background:var(--panel);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:18px;padding:28px;z-index:300;opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.4,0,.2,1);min-width:320px;box-shadow:0 16px 48px rgba(0,0,0,.6)}
#popup.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
#popup h3{font-size:20px;color:var(--accent2);margin-bottom:12px}
#popup .close-btn{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;transition:.2s}
#popup .close-btn:hover{color:#fff}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.popup-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px}
.popup-card .pc-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:4px}
.popup-card .pc-value{font-size:18px;font-weight:700;color:var(--text)}

/* ---- Legend ---- */
#legend{position:fixed;bottom:24px;right:20px;background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:12px;padding:14px 18px;z-index:100;font-size:12px}
#legend h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:8px}
.legend-bar{width:180px;height:10px;border-radius:5px;margin-bottom:4px}
.legend-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim)}

/* ---- Stats ---- */
#stats{position:fixed;top:20px;right:20px;background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:14px;padding:16px 20px;z-index:100;min-width:200px}
#stats h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:10px}
.stat-item{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.stat-item .val{font-weight:600;color:var(--accent)}

@media(max-width:768px){
  #panel{width:220px;padding:14px;left:10px;top:10px}
  #timeline input[type=range]{width:160px}
  #legend,#stats{display:none}
}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader"><div class="spinner"></div><p>正在构建地球...</p></div>

<!-- Control Panel -->
<div id="panel">
  <h2>数据控制面板</h2>
  <div class="ctrl-group">
    <label>数据指标</label>
    <select id="metricSelect">
      <option value="gdp">GDP（万亿美元）</option>
      <option value="population">人口（百万）</option>
      <option value="flights">航班量（万次/年）</option>
      <option value="trade">贸易额（十亿美元）</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>地球自转速度</label>
    <input type="range" id="rotationSpeed" min="0" max="100" value="20">
  </div>
  <div class="toggle-row"><span>城市标记</span><label class="toggle"><input type="checkbox" id="togCities" checked><span class="slider"></span></label></div>
  <div class="toggle-row"><span>航线网络</span><label class="toggle"><input type="checkbox" id="togRoutes" checked><span class="slider"></span></label></div>
  <div class="toggle-row"><span>热力图层</span><label class="toggle"><input type="checkbox" id="togHeat" checked><span class="slider"></span></label></div>
  <div class="toggle-row"><span>大气光晕</span><label class="toggle"><input type="checkbox" id="togAtmo" checked><span class="slider"></span></label></div>
</div>

<!-- Stats -->
<div id="stats">
  <h4>实时统计</h4>
  <div class="stat-item"><span>显示城市</span><span class="val" id="statCities">0</span></div>
  <div class="stat-item"><span>活跃航线</span><span class="val" id="statRoutes">0</span></div>
  <div class="stat-item"><span>全球总量</span><span class="val" id="statTotal">0</span></div>
</div>

<!-- Timeline -->
<div id="timeline">
  <button id="playBtn">▶</button>
  <span class="year" id="yearLabel">2020</span>
  <input type="range" id="timeSlider" min="2015" max="2025" value="2020" step="1">
</div>

<!-- Tooltip -->
<div id="tooltip"><div class="tt-title"></div><div class="tt-body"></div></div>

<!-- Popup -->
<div id="popup">
  <button class="close-btn" onclick="closePopup()">✕</button>
  <h3 id="popupTitle"></h3>
  <div class="popup-grid" id="popupGrid"></div>
</div>

<!-- Legend -->
<div id="legend">
  <h4 id="legendTitle">GDP 热力图</h4>
  <div class="legend-bar" id="legendBar"></div>
  <div class="legend-labels"><span>低</span><span>中</span><span>高</span></div>
</div>

// ======================== STARS ========================
function createStars() {
  const geo = new THREE.BufferGeometry();
  const count = 8000;
  const pos = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const r = 50 + Math.random() * 150;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    sizes[i] = 0.3 + Math.random() * 1.2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true, transparent: true, opacity: 0.8 });
  scene.add(new THREE.Points(geo, mat));
}
createStars();

// ======================== EARTH TEXTURE GENERATION ========================
function createEarthCanvas(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size / 2;
  const ctx = canvas.getContext('2d');

  // Ocean gradient
  const oceanGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  oceanGrad.addColorStop(0, '#0a1628');
  oceanGrad.addColorStop(0.3, '#0d2847');
  oceanGrad.addColorStop(0.5, '#0f3060');
  oceanGrad.addColorStop(0.7, '#0d2847');
  oceanGrad.addColorStop(1, '#0a1628');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Simplified continent data [lon, lat] polygons
  const continents = [
    // North America
    [[-130,50],[-125,60],[-120,68],[-100,72],[-85,75],[-65,72],[-55,50],[-60,45],[-70,42],[-80,25],[-85,18],[-90,16],[-100,20],[-105,22],[-115,30],[-125,45],[-130,50]],
    // South America
    [[-80,10],[-75,5],[-70,-5],[-75,-15],[-70,-25],[-65,-35],[-70,-55],[-75,-50],[-80,-40],[-75,-20],[-80,-5],[-80,10]],
    // Europe
    [[-10,36],[0,38],[5,44],[0,48],[-5,48],[0,52],[5,54],[10,55],[15,55],[25,58],[30,60],[35,62],[40,65],[42,70],[30,72],[20,70],[10,65],[5,60],[0,55],[-5,50],[-10,44],[-10,36]],
    // Africa
    [[-15,30],[-18,15],[-15,10],[-5,5],[5,5],[10,2],[15,-5],[20,-15],[30,-25],[35,-35],[28,-34],[20,-28],[15,-18],[10,-5],[15,5],[25,10],[30,12],[35,15],[40,12],[45,10],[50,12],[42,16],[38,20],[35,30],[30,32],[20,33],[10,37],[0,36],[-5,36],[-15,30]],
    // Asia
    [[30,35],[35,35],[40,40],[45,42],[50,40],[55,38],[60,38],[65,40],[70,38],[75,30],[80,28],[85,28],[90,22],[95,18],[100,15],[105,20],[110,22],[115,25],[120,30],[125,35],[130,40],[135,38],[140,42],[145,45],[140,50],[135,55],[130,60],[120,65],[110,68],[100,72],[90,70],[80,68],[70,70],[60,72],[50,68],[45,62],[40,55],[35,45],[30,35]],
    // Australia
    [[115,-15],[120,-14],[130,-12],[140,-12],[145,-15],[150,-22],[152,-28],[150,-35],[145,-38],[138,-36],[130,-32],[120,-28],[115,-22],[115,-15]],
    // Greenland
    [[-55,60],[-50,62],[-45,65],[-20,72],[-18,78],[-25,82],[-40,84],[-50,82],[-55,78],[-60,72],[-55,60]],
    // Japan
    [[130,31],[132,34],[135,35],[137,37],[140,40],[142,43],[145,45],[144,43],[141,38],[138,35],[135,33],[130,31]],
    // UK
    [[-6,50],[-5,52],[-4,54],[-5,56],[-3,58],[-4,57],[-6,55],[-7,52],[-6,50]],
    // Indonesia
    [[95,-5],[100,-6],[105,-7],[110,-7],[115,-8],[120,-8],[125,-7],[130,-5],[135,-4],[140,-5],[140,-7],[135,-8],[130,-9],[120,-10],[115,-9],[110,-8],[105,-8],[100,-7],[95,-5]],
    // New Zealand
    [[172,-35],[174,-37],[178,-38],[177,-42],[174,-45],[170,-46],[168,-44],[170,-40],[172,-35]],
    // Madagascar
    [[44,-12],[48,-15],[50,-20],[48,-24],[44,-25],[43,-20],[44,-12]],
    // Central America
    [[-90,16],[-88,15],[-85,12],[-82,10],[-80,8],[-78,8],[-82,10],[-86,13],[-90,16]],
    // Scandinavia
    [[5,58],[8,58],[12,60],[15,63],[18,66],[20,68],[25,70],[30,70],[28,68],[22,64],[18,60],[12,57],[8,56],[5,58]],
  ];

  function lonLatToXY(lon, lat) {
    const x = ((lon + 180) / 360) * canvas.width;
    const y = ((90 - lat) / 180) * canvas.height;
    return [x, y];
  }

  // Draw continents
  continents.forEach(cont => {
    ctx.beginPath();
    const [sx, sy] = lonLatToXY(cont[0][0], cont[0][1]);
    ctx.moveTo(sx, sy);
    for (let i = 1; i < cont.length; i++) {
      const [x, y] = lonLatToXY(cont[i][0], cont[i][1]);
      ctx.lineTo(x, y);
    }
    ctx.closePath();

    // Land gradient based on latitude
    ctx.fillStyle = '#1a3a2a';
    ctx.fill();
    ctx.strokeStyle = 'rgba(60,140,80,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Add terrain noise
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * 8;
    data[i] = Math.max(0, Math.min(255, data[i] + noise));
    data[i+1] = Math.max(0, Math.min(255, data[i+1] + noise));
    data[i+2] = Math.max(0, Math.min(255, data[i+2] + noise));
  }
  ctx.putImageData(imageData, 0, 0);

  // Add latitude/longitude grid lines
  ctx.strokeStyle = 'rgba(100,160,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let lat = -80; lat <= 80; lat += 20) {
    const y = ((90 - lat) / 180) * canvas.height;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  for (let lon = -180; lon <= 180; lon += 30) {
    const x = ((lon + 180) / 360) * canvas.width;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }

  return canvas;
}

function createNightCanvas(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size / 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  function lonLatToXY(lon, lat) {
    return [((lon + 180) / 360) * canvas.width, ((90 - lat) / 180) * canvas.height];
  }

  // City light clusters
  const lightCities = [
    [-74,40.7,35],[116.4,39.9,30],[121.5,31.2,28],[139.7,35.7,25],[-0.1,51.5,22],
    [2.3,48.9,18],[55.3,25.2,14],[103.8,1.35,12],[151.2,-33.9,10],[-46.6,-23.5,12],
    [37.6,55.8,15],[72.9,19.1,18],[127,37.6,14],[31.2,30,10],[-118.2,34.1,20],
    [8.7,50.1,10],[-79.4,43.7,8],[100.5,13.8,10],[-99.1,19.4,10],[28,-26.2,6],
    [106.8,-6.2,10],[46.7,24.7,8],[-58.4,-34.6,8],[36.8,-1.3,5],
    // Extra clusters for density
    [-87.6,41.9,12],[-95.4,29.8,10],[12.5,41.9,8],[28.9,41,10],[77.2,28.6,12],
    [100.3,6.9,8],[114.2,22.3,12],[126.9,37.5,10],[139.8,35.5,12],[-43.2,-22.9,8],
    [174.8,-41.3,5],[18.4,-33.9,5],[3.4,6.4,6],[-3.7,40.4,8],[24.9,60.2,5],
    [14.4,50.1,6],[21,52.2,6],[-73.6,45.5,5],[-79.9,25.8,6],[104.1,30.6,10],
  ];

  lightCities.forEach(([lon, lat, intensity]) => {
    const [x, y] = lonLatToXY(lon, lat);
    const r = intensity * (canvas.width / 1024);
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, `rgba(255,200,80,${intensity/40})`);
    grad.addColorStop(0.3, `rgba(255,160,40,${intensity/80})`);
    grad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);

    // Scatter dots
    for (let i = 0; i < intensity * 3; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * r * 0.8;
      const dx = x + Math.cos(angle) * dist;
      const dy = y + Math.sin(angle) * dist;
      ctx.fillStyle = `rgba(255,220,120,${0.2 + Math.random()*0.5})`;
      ctx.fillRect(dx, dy, 1.5, 1.5);
    }
  });

  return canvas;
}

function createBumpCanvas(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size / 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const v = Math.random() * 30;
    imgData.data[i] = imgData.data[i+1] = imgData.data[i+2] = v;
    imgData.data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
}

// Custom earth shader for day/night
const earthMat = new THREE.ShaderMaterial({
  uniforms: {
    dayTexture: { value: earthTex },
    nightTexture: { value: nightTex },
    sunDirection: { value: new THREE.Vector3(1, 0.3, 0.5).normalize() },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D dayTexture;
    uniform sampler2D nightTexture;
    uniform vec3 sunDirection;
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vec3 dayColor = texture2D(dayTexture, vUv).rgb;
      vec3 nightColor = texture2D(nightTexture, vUv).rgb;
      float dotNL = dot(vNormal, sunDirection);
      float dayFactor = smoothstep(-0.15, 0.25, dotNL);
      // Enhance day side
      vec3 dayLit = dayColor * (0.35 + 0.65 * max(0.0, dotNL));
      // Blend
      vec3 color = mix(nightColor * 1.8, dayLit, dayFactor);
      gl_FragColor = vec4(color, 1.0);
    }
  `
});

const earthGeo = new THREE.SphereGeometry(earthRadius, 128, 64);
const earthMesh = new THREE.Mesh(earthGeo, earthMat);
earthGroup.add(earthMesh);

const heatCanvas = document.createElement('canvas');

heatCanvas.height = 1024;

heatTex.colorSpace = THREE.SRGBColorSpace;

const heatMat = new THREE.ShaderMaterial({
  uniforms: {
    heatMap: { value: heatTex },
    opacity: { value: 0.35 },
    sunDirection: { value: earthMat.uniforms.sunDirection.value },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    void main(){
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D heatMap;
    uniform float opacity;
    uniform vec3 sunDirection;
    varying vec2 vUv;
    varying vec3 vNormal;
    void main(){
      vec4 heat = texture2D(heatMap, vUv);
      float light = max(0.15, dot(vNormal, sunDirection));
      gl_FragColor = vec4(heat.rgb * light, heat.a * opacity);
    }
  `,
  transparent: true,
  depthWrite: false,
});

const heatMesh = new THREE.Mesh(new THREE.SphereGeometry(earthRadius + 0.003, 128, 64), heatMat);
earthGroup.add(heatMesh);

function updateHeatmap() {
  const ctx = heatCanvas.getContext('2d');
  ctx.clearRect(0, 0, heatCanvas.width, heatCanvas.height);

  const values = CITIES.map(c => c[currentMetric][currentYearIdx]);
  const maxVal = Math.max(...values);

  CITIES.forEach((city, i) => {
    const x = ((city.lon + 180) / 360) * heatCanvas.width;
    const y = ((90 - city.lat) / 180) * heatCanvas.height;
    const intensity = values[i] / maxVal;
    const radius = 60 + intensity * 120;

    const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    const r = Math.floor(255 * intensity);
    const g = Math.floor(100 * (1 - intensity));
    const b = Math.floor(255 * (1 - intensity));
    grad.addColorStop(0, `rgba(${r},${g},${b},0.6)`);
    grad.addColorStop(0.5, `rgba(${r},${g},${b},0.2)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
  });
  heatTex.needsUpdate = true;
}
updateHeatmap();

const atmoMat = new THREE.ShaderMaterial({
  uniforms: {
    sunDirection: { value: earthMat.uniforms.sunDirection.value },
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vNormal = normalize(normalMatrix * normal);
      vWorldPos = (modelMatrix * vec4(position,1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 sunDirection;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main(){
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fresnel = 1.0 - dot(viewDir, vNormal);
      fresnel = pow(fresnel, 3.0) * 1.5;
      float sunFacing = max(0.0, dot(vNormal, sunDirection));
      vec3 dayAtmo = vec3(0.3, 0.6, 1.0);
      vec3 nightAtmo = vec3(0.05, 0.1, 0.3);
      vec3 color = mix(nightAtmo, dayAtmo, sunFacing * 0.7 + 0.3);
      gl_FragColor = vec4(color, fresnel * 0.65);
    }
  `,
  transparent: true,
  side: THREE.FrontSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const atmoMesh = new THREE.Mesh(new THREE.SphereGeometry(earthRadius * 1.12, 64, 32), atmoMat);

function latLonToVec3(lat, lon, r) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

CITIES.forEach((city, idx) => {
  const pos = latLonToVec3(city.lat, city.lon, earthRadius + 0.01);
  const sprite = new THREE.Sprite(citySpriteMat.clone());
  sprite.position.copy(pos);
  sprite.scale.set(0.04, 0.04, 1);
  sprite.userData = { cityIndex: idx, type: 'city' };
  cityGroup.add(sprite);
  cityMarkers.push(sprite);

  // Pulse ring
  const ringGeo = new THREE.RingGeometry(0.015, 0.022, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthTest: false });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.lookAt(new THREE.Vector3(0, 0, 0));
  ring.userData = { type: 'ring', baseScale: 1 };
  cityGroup.add(ring);
  cityMarkers.push(ring);
});

// ======================== ROUTES ========================
const routeGroup = new THREE.Group();
earthGroup.add(routeGroup);

const routeObjects = [];
const particleObjects = [];

function createArcCurve(from, to, segments = 64) {
  const start = latLonToVec3(from.lat, from.lon, earthRadius);
  const end = latLonToVec3(to.lat, to.lon, earthRadius);
  const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
  const dist = start.distanceTo(end);
  mid.normalize().multiplyScalar(earthRadius + dist * 0.35);

  const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
  return curve;
}

function createRouteParticles(curve, count) {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const offsets = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    offsets[i] = Math.random();
    const p = curve.getPoint(offsets[i]);
    positions[i*3] = p.x;
    positions[i*3+1] = p.y;
    positions[i*3+2] = p.z;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('offset', new THREE.BufferAttribute(offsets, 1));

  const mat = new THREE.PointsMaterial({
    color: 0x4da6ff,
    size: 0.015,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthTest: false,
    sizeAttenuation: true,
  });

  return new THREE.Points(geo, mat);
}

ROUTES.forEach(([fromIdx, toIdx]) => {
  const from = CITIES[fromIdx];
  const to = CITIES[toIdx];
  const curve = createArcCurve(from, to);

  // Arc line
  const points = curve.getPoints(64);
  const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
  const lineMat = new THREE.LineBasicMaterial({
    color: 0x4da6ff,
    transparent: true,
    opacity: 0.15,
    blending: THREE.AdditiveBlending,
    depthTest: false,
  });
  const line = new THREE.Line(lineGeo, lineMat);
  line.userData = { type: 'route', fromIdx, toIdx, from: from.name, to: to.name };
  routeGroup.add(line);
  routeObjects.push(line);

  // Flowing particles
  const particles = createRouteParticles(curve, 5);
  particles.userData = { curve, speeds: Array.from({length:5}, () => 0.15 + Math.random() * 0.15) };
  routeGroup.add(particles);
  particleObjects.push(particles);
});

// ======================== RAYCASTER ========================
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.05;
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const popup = document.getElementById('popup');

let hoveredCity = null;
let hoveredRoute = null;

function onMouseMove(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check cities
  const citySprites = cityMarkers.filter(m => m.userData.type === 'city');
  const cityHits = raycaster.intersectObjects(citySprites);

  // Check routes
  const routeHits = raycaster.intersectObjects(routeObjects);

  if (cityHits.length > 0) {
    const idx = cityHits[0].object.userData.cityIndex;
    const city = CITIES[idx];
    const val = city[currentMetric][currentYearIdx];
    const metricNames = { gdp: 'GDP(万亿$)', population: '人口(百万)', flights: '航班(万次)', trade: '贸易(十亿$)' };

    tooltip.querySelector('.tt-title').textContent = `${city.name}, ${city.country}`;
    tooltip.querySelector('.tt-body').innerHTML = `
      <div class="tt-row"><span>${metricNames[currentMetric]}</span><span>${val}</span></div>
      <div class="tt-row"><span>年份</span><span>${YEARS[currentYearIdx]}</span></div>
    `;
    tooltip.style.left = e.clientX + 15 + 'px';
    tooltip.style.top = e.clientY - 10 + 'px';
    tooltip.classList.add('show');
    document.body.style.cursor = 'pointer';
    hoveredCity = idx;
  } else if (routeHits.length > 0) {
    const r = routeHits[0].object.userData;
    tooltip.querySelector('.tt-title').textContent = `${r.from} ↔ ${r.to}`;
    tooltip.querySelector('.tt-body').innerHTML = `
      <div class="tt-row"><span>航线状态</span><span style="color:#00e676">运行中</span></div>
      <div class="tt-row"><span>日均航班</span><span>${Math.floor(10+Math.random()*40)}</span></div>
    `;
    tooltip.style.left = e.clientX + 15 + 'px';
    tooltip.style.top = e.clientY - 10 + 'px';
    tooltip.classList.add('show');
    document.body.style.cursor = 'pointer';
    hoveredRoute = routeHits[0].object;
    hoveredCity = null;
  } else {
    tooltip.classList.remove('show');
    document.body.style.cursor = 'default';
    hoveredCity = null;
    hoveredRoute = null;
  }
}

function onClick(e) {
  if (hoveredCity === null) return;
  const city = CITIES[hoveredCity];
  const yearIdx = currentYearIdx;

  document.getElementById('popupTitle').textContent = `${city.name}, ${city.country}`;
  const grid = document.getElementById('popupGrid');
  grid.innerHTML = `
    <div class="popup-card"><div class="pc-label">GDP (${YEARS[yearIdx]})</div><div class="pc-value">${city.gdp[yearIdx]} 万亿$</div></div>
    <div class="popup-card"><div class="pc-label">人口</div><div class="pc-value">${city.pop[yearIdx]} 百万</div></div>
    <div class="popup-card"><div class="pc-label">年航班量</div><div class="pc-value">${city.flights[yearIdx]} 万次</div></div>
    <div class="popup-card"><div class="pc-label">贸易额</div><div class="pc-value">${city.trade[yearIdx]} 十亿$</div></div>
    <div class="popup-card"><div class="pc-label">坐标</div><div class="pc-value" style="font-size:14px">${city.lat.toFixed(1)}°, ${city.lon.toFixed(1)}°</div></div>
    <div class="popup-card"><div class="pc-label">GDP 趋势</div><div class="pc-value" style="font-size:14px;color:${city.gdp[yearIdx]>city.gdp[Math.max(0,yearIdx-1)]?'#00e676':'#ff4466'}">${city.gdp[yearIdx]>city.gdp[Math.max(0,yearIdx-1)]?'↑':'↓'} ${Math.abs((city.gdp[yearIdx]-city.gdp[Math.max(0,yearIdx-1)]).toFixed(2))}</div></div>
  `;
  popup.classList.add('show');
}

window.closePopup = () => popup.classList.remove('show');

renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('click', onClick);

// ======================== UI CONTROLS ========================
const metricSelect = document.getElementById('metricSelect');
const timeSlider = document.getElementById('timeSlider');
const yearLabel = document.getElementById('yearLabel');
const playBtn = document.getElementById('playBtn');
const rotSpeedSlider = document.getElementById('rotationSpeed');
const togCities = document.getElementById('togCities');
const togRoutes = document.getElementById('togRoutes');
const togHeat = document.getElementById('togHeat');
const togAtmo = document.getElementById('togAtmo');

metricSelect.addEventListener('change', () => {
  currentMetric = metricSelect.value;
  updateHeatmap();
  updateStats();
  updateLegend();
});

timeSlider.addEventListener('input', () => {
  currentYearIdx = parseInt(timeSlider.value) - 2015;
  yearLabel.textContent = YEARS[currentYearIdx];
  updateHeatmap();
  updateStats();
  updateCitySizes();
});

playBtn.addEventListener('click', () => {
  isPlaying = !isPlaying;
  playBtn.textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    playInterval = setInterval(() => {
      currentYearIdx = (currentYearIdx + 1) % YEARS.length;
      timeSlider.value = YEARS[currentYearIdx];
      yearLabel.textContent = YEARS[currentYearIdx];
      updateHeatmap();
      updateStats();
      updateCitySizes();
    }, 1200);
  } else {
    clearInterval(playInterval);
  }
});

togCities.addEventListener('change', () => { cityGroup.visible = togCities.checked; });
togRoutes.addEventListener('change', () => { routeGroup.visible = togRoutes.checked; });
togHeat.addEventListener('change', () => { heatMesh.visible = togHeat.checked; });
togAtmo.addEventListener('change', () => { atmoMesh.visible = togAtmo.checked; outerGlow.visible = togAtmo.checked; });

function updateStats() {
  document.getElementById('statCities').textContent = CITIES.length;
  document.getElementById('statRoutes').textContent = ROUTES.length;
  const total = CITIES.reduce((s, c) => s + c[currentMetric][currentYearIdx], 0);
  document.getElementById('statTotal').textContent = total.toFixed(1);
}

function updateCitySizes() {
  const values = CITIES.map(c => c[currentMetric][currentYearIdx]);
  const maxVal = Math.max(...values);
  cityMarkers.forEach(m => {
    if (m.userData.type === 'city') {
      const idx = m.userData.cityIndex;
      const scale = 0.025 + (values[idx] / maxVal) * 0.045;
      m.scale.set(scale, scale, 1);
    }
  });
}

function updateLegend() {
  const names = { gdp: 'GDP 热力图', population: '人口热力图', flights: '航班量热力图', trade: '贸易额热力图' };
  document.getElementById('legendTitle').textContent = names[currentMetric];
  document.getElementById('legendBar').style.background = 'linear-gradient(to right, #0044ff, #00ccff, #00ff88, #ffcc00, #ff2200)';
}
updateStats();
updateLegend();
updateCitySizes();

// ======================== ANIMATION LOOP ========================
const clock = new THREE.Clock();
let autoRotateSpeed = 0.001;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Auto rotation
  autoRotateSpeed = rotSpeedSlider.value / 20000;
  earthGroup.rotation.y += autoRotateSpeed;

  // Sun direction rotation for day/night cycle
  const sunAngle = t * 0.05;
  const sunDir = new THREE.Vector3(Math.cos(sunAngle), 0.3, Math.sin(sunAngle)).normalize();
  earthMat.uniforms.sunDirection.value.copy(sunDir);
  sunLight.position.copy(sunDir.clone().multiplyScalar(5));

  // Pulse city rings
  cityMarkers.forEach(m => {
    if (m.userData.type === 'ring') {
      const pulse = 1 + Math.sin(t * 3 + m.id) * 0.3;
      m.scale.set(pulse, pulse, pulse);
      m.material.opacity = 0.5 - Math.sin(t * 3 + m.id) * 0.3;
    }
  });

  // Animate route particles
  particleObjects.forEach(particles => {
    const posAttr = particles.geometry.attributes.position;
    const offAttr = particles.geometry.attributes.offset;
    const curve = particles.userData.curve;
    const speeds = particles.userData.speeds;

    for (let i = 0; i < offAttr.count; i++) {
      offAttr.array[i] = (offAttr.array[i] + speeds[i] * 0.005) % 1;
      const p = curve.getPoint(offAttr.array[i]);
      posAttr.array[i*3] = p.x;
      posAttr.array[i*3+1] = p.y;
      posAttr.array[i*3+2] = p.z;
    }
    posAttr.needsUpdate = true;
  });

  // Highlight hovered route
  routeObjects.forEach(r => {
    if (r === hoveredRoute) {
      r.material.opacity = 0.6;
      r.material.color.setHex(0x00e5ff);
    } else {
      r.material.opacity = 0.15;
      r.material.color.setHex(0x4da6ff);
    }
  });

  controls.update();
  renderer.render(scene, camera);
}

// ======================== RESIZE ========================
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ======================== START ========================
setTimeout(() => {
  document.getElementById('loader').classList.add('hidden');
  setTimeout(() => document.getElementById('loader').remove(), 800);
}, 1500);

animate();
</script>
